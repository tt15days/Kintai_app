# リリース環境用設定（本番・ステージング共通）
# 環境変数で接続先を制御する。ハードコード禁止。
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    baseline-on-migrate: false
    clean-disabled: true
    # リリース環境ではマイグレーションのみ適用（サンプルデータ除外）
    locations:
      - classpath:db/migration
  thymeleaf:
    cache: true

server:
  servlet:
    session:
      # アイドルタイムアウトを明示（既定値への暗黙依存を避ける）
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
        # HTTPS 前提で既定 true。TLS 終端がない環境のみ SESSION_COOKIE_SECURE=false で上書きする
        secure: ${SESSION_COOKIE_SECURE:true}

logging:
  file:
    path: ${LOG_PATH:logs}
  level:
    root: WARN
    com.attendance.app: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.mybatis: WARN
    java.sql: WARN
