<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='leave-usage'">
<head>
    <title>有給休暇取得状況</title>
</head>
<body>
    <h2 layout:fragment="page-title">有給休暇取得状況 (<span class="font-mono" th:text="${currentYear}">2026</span>年)</h2>

    <div layout:fragment="content">
        <div th:if="${error}" class="alert alert-danger mb-4" role="alert" aria-live="assertive" th:text="${error}"></div>

        <div class="card mb-6">
            <form class="flex flex-wrap items-end gap-4" method="get" th:action="@{/admin/leave-usage}">
                <div class="flex flex-col min-w-[180px]">
                    <label for="leaveUsageDepartment" class="form-label">部署 / クラス</label>
                    <select id="leaveUsageDepartment" class="form-select h-11" name="department">
                        <option value="All Departments" th:selected="${department == 'All Departments' or department == null}">全部署</option>
                        <option th:each="dept : ${departments}" th:value="${dept}" th:text="${dept}" th:selected="${department == dept}"></option>
                    </select>
                </div>
                <div class="flex flex-col flex-1 min-w-[200px]">
                    <label for="leaveUsageKeyword" class="form-label">社員検索</label>
                    <input id="leaveUsageKeyword" type="text" class="form-input h-11" name="keyword" placeholder="名前またはID" th:value="${keyword}">
                </div>
                <div class="flex flex-col min-w-[100px]"><label for="leaveUsagePageSize" class="form-label">表示件数</label><select id="leaveUsagePageSize" class="form-select h-11" name="size"><option value="20" th:selected="${pageSize == 20}">20件</option><option value="50" th:selected="${pageSize == 50}">50件</option><option value="100" th:selected="${pageSize == 100}">100件</option></select></div>
                <button type="submit" class="btn btn-primary gap-2 text-sm h-11">
                    <i class="fa-solid fa-filter"></i> 表示
                </button>
            </form>
        </div>

        <div class="card">
            <p class="text-sm text-txt-secondary mb-6">
                各従業員の当年度の付与・取得実績と、繰越を含む累計残日数、および年5日取得義務の達成状況を確認できます。
            </p>
            <div class="table-container">
                <table class="table-custom">
                    <thead class="bg-black/10 text-txt-primary">
                        <tr>
                            <th>社員ID</th>
                            <th>氏名</th>
                            <th>当年度付与日数</th>
                            <th>当年度取得日数</th>
                            <th>累計残日数</th>
                            <th>5日取得義務</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-glass-border/10">
                        <tr th:each="user : ${users}">
                            <td class="font-mono" th:text="${(empNoPrefix != null ? empNoPrefix : '') + #numbers.formatInteger(user.userId, 3)}">EMP-1</td>
                            <td class="font-semibold" th:text="${user.fullName}">氏名</td>
                            <td class="font-mono" th:with="balance=${balanceMap[user.userId]}" th:text="${balance.grantedDays} + ' 日'">10 日</td>
                            <td class="font-mono" th:with="balance=${balanceMap[user.userId]}" th:text="${balance.usedDays} + ' 日'">2 日</td>
                            <td class="font-mono" th:text="${(remainingTotalMap[user.userId] != null ? remainingTotalMap[user.userId] : 0)} + ' 日'">8 日</td>
                            <td>
                                <span th:if="${obligationMetMap[user.userId]}" class="badge badge-success"><i class="fa-solid fa-check"></i> 達成</span>
                                <span th:unless="${obligationMetMap[user.userId]}" class="badge badge-danger"><i class="fa-solid fa-triangle-exclamation"></i> 未達成</span>
                            </td>
                        </tr>
                        <tr th:if="${users == null or #lists.isEmpty(users)}">
                            <td colspan="6" class="py-10 text-center text-txt-secondary">
                                <p th:if="${(keyword != null and !#strings.isEmpty(#strings.trim(keyword))) or (department != null and department != 'All Departments')}" class="mb-3">条件に一致する従業員がいません。絞り込み条件を変更してください。</p>
                                <p th:unless="${(keyword != null and !#strings.isEmpty(#strings.trim(keyword))) or (department != null and department != 'All Departments')}" class="mb-3">表示対象の従業員がいません。</p>
                                <a th:if="${(keyword != null and !#strings.isEmpty(#strings.trim(keyword))) or (department != null and department != 'All Departments')}" th:href="@{/admin/leave-usage}" class="btn btn-flat text-sm">条件を解除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="flex justify-between items-center mt-4" th:if="${totalPages > 1}">
                <a class="btn btn-flat text-sm" th:if="${page > 0}" th:href="@{/admin/leave-usage(department=${department},keyword=${keyword},page=${page - 1},size=${pageSize})}">前へ</a>
                <span class="text-sm text-txt-secondary" th:text="${page + 1} + ' / ' + ${totalPages} + ' ページ'">1 / 1 ページ</span>
                <a class="btn btn-flat text-sm" th:if="${page + 1 < totalPages}" th:href="@{/admin/leave-usage(department=${department},keyword=${keyword},page=${page + 1},size=${pageSize})}">次へ</a>
            </div>
        </div>
    </div>
</body>
</html>
