<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='manage'">
<head>
    <title>勤怠管理</title>
</head>
<body>
    <h2 layout:fragment="page-title">勤怠管理</h2>

    <div layout:fragment="content">
        <div class="card mb-6">
            <form class="flex flex-wrap items-end gap-4" method="get" th:action="@{/admin/attendance}">
                <div class="flex flex-col min-w-[150px]">
                    <label for="attendanceYearMonth" class="form-label">対象月</label>
                    <input id="attendanceYearMonth" type="month" class="form-input text-base md:text-sm font-mono h-11" name="yearMonth" th:value="${yearMonth}">
                </div>
                <div class="flex flex-col min-w-[180px]">
                    <label for="attendanceDepartment" class="form-label">部署 / クラス</label>
                    <select id="attendanceDepartment" class="form-select h-11" name="department">
                        <option value="All Departments" th:selected="${department == 'All Departments' or department == null}">全部署</option>
                        <option th:each="dept : ${departments}" th:value="${dept}" th:text="${dept}" th:selected="${department == dept}"></option>
                    </select>
                </div>
                <div class="flex flex-col flex-1 min-w-[200px]">
                    <label for="attendanceKeyword" class="form-label">社員検索</label>
                    <input id="attendanceKeyword" type="text" class="form-input h-11" name="keyword" placeholder="名前またはID" th:value="${keyword}">
                </div>
                <div class="flex flex-col min-w-[100px]"><label for="attendancePageSize" class="form-label">表示件数</label><select id="attendancePageSize" class="form-select h-11" name="size"><option value="20" th:selected="${pageSize == 20}">20件</option><option value="50" th:selected="${pageSize == 50}">50件</option><option value="100" th:selected="${pageSize == 100}">100件</option></select></div>
                <button type="submit" class="btn btn-primary gap-2 text-sm h-11">
                    <i class="fa-solid fa-filter"></i> 表示
                </button>
            </form>
        </div>

        <div class="card">
            <div class="flex justify-between items-center pb-4 mb-6 border-b border-glass-border/30">
                <h3 class="text-base font-bold text-txt-primary">勤怠一覧</h3>
                <a th:href="@{/admin/attendance/export/zip(yearMonth=${yearMonth},department=${department},keyword=${keyword})}" class="btn btn-success gap-2 text-sm px-4 py-2"><i class="fa-solid fa-file-export"></i> ZIP出力</a>
            </div>
            <div class="table-container">
                <table class="table-custom">
                    <thead class="bg-black/10 text-txt-primary">
                        <tr>
                            <th>社員ID</th>
                            <th>氏名</th>
                            <th>総労働時間</th>
                            <th>残業時間</th>
                            <th>深夜労働</th>
                            <th>ステータス</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-glass-border/10">
                        <tr th:each="user : ${users}" th:classappend="${submissionByUserMap[user.userId] != null and submissionByUserMap[user.userId].status == submissionStatusPending ? 'bg-warning/5 font-medium' : ''}">
                            <td><a th:href="@{/admin/attendance/{userId}(userId=${user.userId}, yearMonth=${yearMonth})}" th:text="${(empNoPrefix != null ? empNoPrefix : '') + #numbers.formatInteger(user.userId, 3)}" class="text-primary hover:underline font-mono">EMP-001</a></td>
                             <td>
                                 <a th:href="@{/admin/attendance/{userId}(userId=${user.userId}, yearMonth=${yearMonth})}" class="text-primary hover:underline font-semibold">
                                     <span th:text="${user.fullName}">John Doe</span>
                                 </a>
                                 <span th:unless="${user.isActive}" class="text-xs text-red-500 font-normal ml-1">(無効)</span>
                             </td>
                            <td class="font-mono" th:with="wh=${workingSumByUserMap[user.userId]}" th:text="${wh != null ? T(com.attendance.app.util.DateTimeUtil).formatHoursToHHmm(wh) : '0時間0分'}">160時間</td>
                            <td class="font-mono" th:with="ot=${overtimeSumByUserMap[user.userId]}" th:text="${ot != null ? T(com.attendance.app.util.DateTimeUtil).formatHoursToHHmm(ot) : '0時間0分'}">12時間</td>
                            <td class="font-mono" th:with="ns=${nightShiftSumByUserMap[user.userId]}" th:text="${ns != null ? T(com.attendance.app.util.DateTimeUtil).formatHoursToHHmm(ns) : '0時間0分'}">0.0時間</td>
                            <td>
                                <span th:if="${submissionByUserMap[user.userId] == null}" class="badge bg-black/5 text-txt-secondary border-glass-border">未提出</span>
                                <span th:if="${submissionByUserMap[user.userId] != null and submissionByUserMap[user.userId].status == submissionStatusPending}" class="badge badge-warning animate-pulse">承認待ち</span>
                                <span th:if="${submissionByUserMap[user.userId] != null and submissionByUserMap[user.userId].status == submissionStatusApproved}" class="badge badge-success">承認済</span>
                                <span th:if="${submissionByUserMap[user.userId] != null and submissionByUserMap[user.userId].status == submissionStatusReturned}" class="badge badge-danger">差戻し</span>
                            </td>
                        </tr>
                        <tr th:if="${users == null or #lists.isEmpty(users)}">
                            <td colspan="6" class="py-10 text-center text-txt-secondary">
                                <p th:if="${(keyword != null and !#strings.isEmpty(#strings.trim(keyword))) or (department != null and department != 'All Departments')}" class="mb-3">条件に一致する従業員がいません。絞り込み条件を変更してください。</p>
                                <p th:unless="${(keyword != null and !#strings.isEmpty(#strings.trim(keyword))) or (department != null and department != 'All Departments')}" class="mb-3">表示対象の従業員がいません。</p>
                                <a th:if="${(keyword != null and !#strings.isEmpty(#strings.trim(keyword))) or (department != null and department != 'All Departments')}" th:href="@{/admin/attendance(yearMonth=${yearMonth})}" class="btn btn-flat text-sm">条件を解除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="flex justify-between items-center mt-4" th:if="${totalPages > 1}">
                <a class="btn btn-flat text-sm" th:if="${page > 0}" th:href="@{/admin/attendance(yearMonth=${yearMonth},department=${department},keyword=${keyword},page=${page - 1},size=${pageSize})}">前へ</a>
                <span class="text-sm text-txt-secondary" th:text="${page + 1} + ' / ' + ${totalPages} + ' ページ'">1 / 1 ページ</span>
                <a class="btn btn-flat text-sm" th:if="${page + 1 < totalPages}" th:href="@{/admin/attendance(yearMonth=${yearMonth},department=${department},keyword=${keyword},page=${page + 1},size=${pageSize})}">次へ</a>
            </div>
        </div>
    </div>
</body>
</html>
