<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='notifications'">
<head>
    <title>通知管理</title>
</head>
<body>
    <h2 layout:fragment="page-title">通知管理</h2>

    <div layout:fragment="content">
        <!-- フラッシュメッセージ -->
        <div th:if="${successMessage}" class="alert alert-success items-start gap-4" role="status" aria-live="polite">
            <span class="flex items-start gap-2 flex-1 min-w-0 break-all">
                <span th:text="${successMessage}"></span>
            </span>
            <button type="button" class="icon-button text-txt-primary hover:opacity-75 transition-opacity shrink-0" onclick="this.parentElement.remove()" aria-label="閉じる">×</button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger items-start gap-4" role="alert" aria-live="assertive">
            <span class="flex items-start gap-2 flex-1 min-w-0 break-all">
                <span th:text="${errorMessage}"></span>
            </span>
            <button type="button" class="icon-button text-txt-primary hover:opacity-75 transition-opacity shrink-0" onclick="this.parentElement.remove()" aria-label="閉じる">×</button>
        </div>

        <div class="card mb-6">
            <h3 class="text-base font-bold text-txt-primary pb-4 mb-4 border-b border-glass-border/30">新規通知作成</h3>
            <form th:action="@{/admin/notifications/send}" method="post" class="space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
                <div>
                    <label for="notificationMessage" class="form-label">メッセージ</label>
                    <textarea id="notificationMessage" name="message" class="form-textarea" rows="4" placeholder="メッセージを入力してください..." required></textarea>
                </div>
                <fieldset class="space-y-3">
                    <legend class="form-label">送信対象</legend>
                    <div class="flex flex-wrap items-center gap-x-6 gap-y-2">
                        <label class="choice-label">
                            <input type="radio" name="targetType" value="all" checked onclick="toggleTargetFields()" class="form-radio text-primary">
                            <span class="ml-2 text-sm text-txt-primary">全従業員</span>
                        </label>
                        <label class="choice-label">
                            <input type="radio" name="targetType" value="user" onclick="toggleTargetFields()" class="form-radio text-primary">
                            <span class="ml-2 text-sm text-txt-primary">特定の従業員</span>
                        </label>
                        <label class="choice-label">
                            <input type="radio" name="targetType" value="class" onclick="toggleTargetFields()" class="form-radio text-primary">
                            <span class="ml-2 text-sm text-txt-primary">勤務クラス</span>
                        </label>
                    </div>
                </fieldset>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div id="userTargetWrapper" class="hidden">
                        <label for="userIdSelect" class="form-label">従業員</label>
                        <select id="userIdSelect" name="userId" class="form-select">
                            <option value="">従業員を選択...</option>
                            <option th:each="user : ${activeUsers}" th:value="${user.userId}" th:text="${user.fullName}"></option>
                        </select>
                    </div>
                    <div id="classTargetWrapper" class="hidden">
                        <label for="classIdSelect" class="form-label">勤務クラス</label>
                        <select id="classIdSelect" name="classId" class="form-select">
                            <option value="">勤務クラスを選択...</option>
                            <option th:each="cls : ${classes}" th:value="${cls.classId}" th:text="${cls.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="pt-2">
                    <button type="submit" class="btn btn-primary gap-2 text-sm" onclick="return confirmSendNotification()">
                        <i class="fa-solid fa-paper-plane"></i> 通知を送信
                    </button>
                </div>
            </form>
        </div>

        <script>
            function confirmSendNotification() {
                const targetType = document.querySelector('input[name="targetType"]:checked').value;
                const message = targetType === 'all'
                    ? '送信対象は「全従業員」です。この内容で通知を送信します。よろしいですか？'
                    : '通知を送信します。よろしいですか？';
                return confirm(message);
            }

            function toggleTargetFields() {
                const targetType = document.querySelector('input[name="targetType"]:checked').value;
                const userWrapper = document.getElementById('userTargetWrapper');
                const classWrapper = document.getElementById('classTargetWrapper');
                const userSelect = document.getElementById('userIdSelect');
                const classSelect = document.getElementById('classIdSelect');

                if (targetType === 'all') {
                    userWrapper.classList.add('hidden');
                    classWrapper.classList.add('hidden');
                    userSelect.value = '';
                    classSelect.value = '';
                    userSelect.removeAttribute('required');
                    classSelect.removeAttribute('required');
                } else if (targetType === 'user') {
                    userWrapper.classList.remove('hidden');
                    classWrapper.classList.add('hidden');
                    classSelect.value = '';
                    userSelect.setAttribute('required', 'required');
                    classSelect.removeAttribute('required');
                } else if (targetType === 'class') {
                    userWrapper.classList.add('hidden');
                    classWrapper.classList.remove('hidden');
                    userSelect.value = '';
                    userSelect.removeAttribute('required');
                    classSelect.setAttribute('required', 'required');
                }
            }
            // Initialize on load
            window.addEventListener('DOMContentLoaded', toggleTargetFields);
        </script>
    </div>
</body>
</html>
