<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='schedules'">
<head>
    <title>勤務クラス設定</title>
</head>
<body>
    <h2 layout:fragment="page-title" class="text-2xl font-bold text-txt-primary flex items-center gap-2">勤務クラス設定</h2>

    <div layout:fragment="content">
        <!-- メッセージ表示 -->
        <div th:if="${successMessage}" class="alert alert-success items-start gap-4">
            <span class="flex items-start gap-2 flex-1 min-w-0 break-all">
                <span th:text="${successMessage}"></span>
            </span>
            <button type="button" class="text-txt-primary hover:opacity-75 transition-opacity shrink-0 mt-0.5" onclick="this.parentElement.remove()" aria-label="閉じる">×</button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger items-start gap-4">
            <span class="flex items-start gap-2 flex-1 min-w-0 break-all">
                <span th:text="${errorMessage}"></span>
            </span>
            <button type="button" class="text-txt-primary hover:opacity-75 transition-opacity shrink-0 mt-0.5" onclick="this.parentElement.remove()" aria-label="閉じる">×</button>
        </div>

        <div class="space-y-6">
            <!-- 登録済み勤務クラス一覧のヘッダー -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <h3 class="text-lg font-bold text-txt-primary flex items-center gap-2">登録済み勤務クラス一覧</h3>
                <button type="button" onclick="openCreateModal()" class="btn btn-primary gap-2 text-sm w-full sm:w-auto">新規登録</button>
            </div>
            
            <!-- 検索・フィルターパネル -->
            <div class="card-sm mb-6 flex flex-wrap gap-4 items-center">
                <div class="flex flex-col gap-1.5 flex-1 min-w-[200px]">
                    <label class="text-xs font-bold text-txt-secondary flex items-center gap-1" for="folderFilter">フォルダ分類</label>
                    <select id="folderFilter" class="form-select py-1.5 text-sm" onchange="filterSchedules()">
                        <option value="">すべて</option>
                        <!-- JSでフォルダ一覧を動的に生成します -->
                    </select>
                </div>
                <div class="w-full">
                    <label class="text-xs font-bold text-txt-secondary flex items-center gap-1 mb-1.5">タグで絞り込む</label>
                    <div class="flex flex-wrap gap-2 mt-1" id="tagCloud">
                        <!-- JSでタグ一覧を動的に生成します -->
                    </div>
                </div>
            </div>

            <!-- タイル（グリッド）表示 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="scheduleList">
                <div class="card work-class-card" 
                     th:each="schedule : ${workScheduleClasses}"
                     th:data-id="${schedule.classId}"
                     th:data-name="${schedule.name}"
                     th:data-class-code="${schedule.classCode}"
                     th:data-work-location="${schedule.workLocation}"
                     th:data-address="${schedule.address}"
                     th:data-station="${schedule.station}"
                     th:data-telephone="${schedule.telephone}"
                     th:data-section-name="${schedule.sectionName}"
                     th:data-folder="${schedule.folderName}"
                     th:data-tags="${schedule.tags}"
                     th:data-is-active="${schedule.isActive}"
                     th:data-start-time="${#temporals.format(schedule.startTime, 'HH:mm')}"
                     th:data-end-time="${#temporals.format(schedule.endTime, 'HH:mm')}"
                     th:data-breaks="${schedule.breaks != null ? #strings.listJoin(schedule.breaks.![#temporals.format(breakStartTime, 'HH:mm') + '-' + #temporals.format(breakEndTime, 'HH:mm')], ',') : ''}"
                     th:data-max-hours="${schedule.maxHours}"
                     th:data-min-hours="${schedule.minHours}"
                     th:classappend="${schedule.isActive != null and !schedule.isActive} ? 'opacity-60' : ''">
                    
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-base font-bold text-txt-primary" th:text="${schedule.name} + ' (' + ${schedule.classCode} + ')'">Standard Shift (W001)</h4>
                        <div>
                            <span th:if="${schedule.isActive == null or schedule.isActive}" class="badge badge-success">有効</span>
                            <span th:if="${schedule.isActive != null and !schedule.isActive}" class="badge badge-danger">無効</span>
                        </div>
                    </div>

                    <!-- フォルダとタグの表示 -->
                    <div class="flex flex-wrap gap-2 mb-4 items-center">
                        <span th:if="${schedule.folderName != null and !schedule.folderName.trim().isEmpty()}" class="badge bg-black/5 text-txt-secondary border-glass-border">
                            <span th:text="${schedule.folderName}"></span>
                        </span>
                        <span th:if="${schedule.tags == null or schedule.tags.trim().isEmpty()}" class="badge border-accent/20 bg-accent/15 text-accent">
                            <span>未設定</span>
                        </span>
                        <span th:if="${schedule.tags != null and !schedule.tags.trim().isEmpty()}" th:each="tag : ${#strings.arraySplit(schedule.tags, ',')}" class="badge border-accent/20 bg-accent/15 text-accent">
                            <span th:text="${tag.trim()}"></span>
                        </span>
                    </div>
                    
                    <div class="text-txt-secondary mb-6 text-sm flex flex-col gap-2">
                        <div>
                            勤務地: <span th:text="${schedule.workLocation != null and !schedule.workLocation.isEmpty() ? schedule.workLocation : '未指定'}">本社</span>
                        </div>
                        <div>
                            最寄り駅: <span th:text="${schedule.station != null and !schedule.station.isEmpty() ? schedule.station : '未指定'}">六本木駅</span>
                        </div>
                        <div>
                            勤務時間: <span class="font-mono text-txt-primary font-bold" th:text="${#temporals.format(schedule.startTime, 'HH:mm')} + ' - ' + ${#temporals.format(schedule.endTime, 'HH:mm')}">09:00 - 18:00</span>
                        </div>
                        <div>
                            休憩時間: <span class="font-mono text-txt-primary font-bold" th:text="${schedule.breakScheduleSummary} + ' (計' + ${schedule.totalBreakMinutes} + '分)'">12:00〜13:00 (計60分)</span>
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <!-- 編集ボタン -->
                        <button type="button" class="btn btn-flat flex-1 text-sm py-2" th:onclick="'enterEditMode(this, ' + ${schedule.classId} + ')'">編集</button>
                        <!-- 削除ボタン -->
                        <form th:action="@{/admin/work-schedules/{classId}/delete(classId=${schedule.classId})}" method="post" class="flex-1 m-0"
                              onclick="return confirm('この勤務クラスを削除しますか？紐づく従業員の時間計算に影響を与える場合があります。')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-danger w-full text-sm py-2">削除</button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${workScheduleClasses.isEmpty()}" class="card text-center p-12">
                <p class="text-txt-secondary m-0 flex items-center justify-center gap-2">登録済みの勤務クラスはありません。</p>
            </div>
            
            <!-- 検索結果がゼロの場合のプレースホルダー -->
            <div id="noResults" class="card text-center p-12" style="display: none;">
                <p class="text-txt-secondary m-0 flex items-center justify-center gap-2">該当する勤務クラスはありません。</p>
            </div>
        </div>

    </div>

    <th:block layout:fragment="modals">
        <!-- 勤務クラス登録・編集モーダル -->
        <div id="scheduleModal" class="modal absolute inset-0 z-[2000] overflow-y-auto bg-black/60 backdrop-blur-sm hidden transition-all duration-300" onclick="cancelEditMode(); closeModal('scheduleModal')">
            <div class="flex min-h-full items-center justify-center p-4">
                <div id="modalContent" class="card-heavy w-full max-w-2xl" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-start mb-6 gap-4">
                        <h3 id="formTitle" class="text-base sm:text-lg font-bold text-txt-primary flex items-center gap-2 flex-1 min-w-0 break-words">勤務クラス新規登録</h3>
                        <button type="button" class="text-txt-primary hover:opacity-75 transition-opacity shrink-0 mt-0.5" onclick="cancelEditMode(); closeModal('scheduleModal')" aria-label="閉じる">×</button>
                    </div>

                    <form id="scheduleForm" th:action="@{/admin/work-schedules/create}" method="post" class="space-y-4">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-txt-secondary flex items-center gap-1" for="name">
                                勤務クラス名 <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="name" name="name" class="form-input" placeholder="例) 本社標準勤務、テレワーク勤務" required>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="folderName">フォルダ分類</label>
                                <input type="text" id="folderName" name="folderName" class="form-input" placeholder="例) 本社、開発部">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="tags">タグ (カンマ区切り)</label>
                                <input type="text" id="tags" name="tags" class="form-input" placeholder="例) 時短,シフト">
                            </div>
                        </div>

                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-txt-secondary" for="workLocation">勤務地</label>
                            <input type="text" id="workLocation" name="workLocation" class="form-input" placeholder="例) 本社、在宅、支店等">
                        </div>

                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-txt-secondary" for="address">住所</label>
                            <input type="text" id="address" name="address" class="form-input" placeholder="例) 東京都港区〇〇1-2-3">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="station">最寄り駅</label>
                                <input type="text" id="station" name="station" class="form-input" placeholder="例) 六本木駅">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="telephone">電話番号</label>
                                <input type="tel" id="telephone" name="telephone" class="form-input" placeholder="例) 03-1234-5678">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="sectionName">所属部署</label>
                                <input type="text" id="sectionName" name="sectionName" class="form-input" placeholder="例) 営業部">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="isActive">状態</label>
                                <select id="isActive" name="isActive" class="form-select">
                                    <option value="true" selected>有効</option>
                                    <option value="false">無効</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary flex items-center gap-1" for="startTime">
                                    始業時刻 <span class="text-danger">*</span>
                                </label>
                                <input type="time" id="startTime" name="startTime" class="form-input font-mono" required value="09:00">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary flex items-center gap-1" for="endTime">
                                    終業時刻 <span class="text-danger">*</span>
                                </label>
                                <input type="time" id="endTime" name="endTime" class="form-input font-mono" required value="18:00">
                            </div>
                        </div>

                        <!-- 休憩時間設定（動的追加） -->
                        <div class="card bg-glass/20 border border-glass-border/30 p-4 space-y-4">
                            <div class="flex justify-between items-center">
                                <label class="text-sm font-semibold text-txt-secondary flex items-center gap-1">休憩時間設定 <span class="text-danger">*</span></label>
                                <button type="button" class="btn btn-secondary text-xs py-1 px-3" onclick="addBreakRow()">追加</button>
                            </div>
                            <div id="breaksContainer" class="space-y-3">
                                <!-- JSで動的に追加されます -->
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="maxHours">最大勤務時間</label>
                                <input type="number" id="maxHours" name="maxHours" class="form-input font-mono" placeholder="例) 10" min="1" max="24">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="minHours">最小勤務時間</label>
                                <input type="number" id="minHours" name="minHours" class="form-input font-mono" placeholder="例) 4" min="1" max="24">
                            </div>
                        </div>

                        <div class="flex flex-col-reverse sm:flex-row gap-3 mt-4">
                            <button type="button" onclick="cancelEditMode(); closeModal('scheduleModal')" class="btn btn-flat sm:flex-1 w-full">キャンセル</button>
                            <button type="submit" id="submitBtn" class="btn btn-primary sm:flex-[2] w-full">
                                <span id="submitBtnText">勤務クラスを登録する</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </th:block>

    <!-- JavaScript 処理 -->
    <th:block layout:fragment="js">
        <script th:inline="javascript">
            /*<![CDATA[*/
        
        // アコーディオンの制御
        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById('accordionIcon');
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                content.classList.add('max-h-0');
                content.classList.remove('max-h-[500px]', 'pb-4');
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('open');
                content.classList.remove('max-h-0');
                content.classList.add('max-h-[500px]', 'pb-4');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        // 新規登録モーダルを開く（openModal/closeModal は main.js の共通ユーティリティを使用）
        function openCreateModal() {
            cancelEditMode();
            openModal('scheduleModal');
        }

        // 編集モード関連変数
        const scheduleForm = document.getElementById('scheduleForm');
        const formTitle = document.getElementById('formTitle');
        const submitBtnText = document.getElementById('submitBtnText');
        
        let breakIndex = 0;
        function addBreakRow(startTime = '', endTime = '') {
            const container = document.getElementById('breaksContainer');
            const rowId = 'break-row-' + breakIndex;
            
            const div = document.createElement('div');
            div.id = rowId;
            div.className = 'grid grid-cols-12 gap-2 items-center';
            
            div.innerHTML = `
                <div class="col-span-5 flex flex-col gap-1">
                    <input type="time" name="breakStartTimes" class="form-input font-mono" required value="${startTime}">
                </div>
                <div class="col-span-1 text-center text-txt-secondary">〜</div>
                <div class="col-span-5 flex flex-col gap-1">
                    <input type="time" name="breakEndTimes" class="form-input font-mono" required value="${endTime}">
                </div>
                <div class="col-span-1 text-center">
                    <button type="button" class="text-danger hover:opacity-75 transition-opacity text-xs" onclick="removeBreakRow('${rowId}')">削除</button>
                </div>
            `;
            
            container.appendChild(div);
            breakIndex++;
        }
        
        function removeBreakRow(rowId) {
            const row = document.getElementById(rowId);
            if (row) {
                const container = document.getElementById('breaksContainer');
                if (container.children.length > 1) {
                    row.remove();
                } else {
                    alert("休憩時間は少なくとも1つ設定してください");
                }
            }
        }

        // 編集モードに入る
        function enterEditMode(button, classId) {
            // 対象のカードからデータを取得
            const card = button.closest('.work-class-card');
            
            const name = card.getAttribute('data-name');
            const workLocation = card.getAttribute('data-work-location') || '';
            const address = card.getAttribute('data-address') || '';
            const station = card.getAttribute('data-station') || '';
            const telephone = card.getAttribute('data-telephone') || '';
            const sectionName = card.getAttribute('data-section-name') || '';
            const folder = card.getAttribute('data-folder') || '';
            const tags = card.getAttribute('data-tags') || '';
            const isActive = card.getAttribute('data-is-active') || 'true';
            
            const startTime = card.getAttribute('data-start-time');
            const endTime = card.getAttribute('data-end-time');
            const breaksStr = card.getAttribute('data-breaks') || '';
            
            const maxHours = card.getAttribute('data-max-hours') || '';
            const minHours = card.getAttribute('data-min-hours') || '';

            // フォームの値を設定
            document.getElementById('name').value = name;
            document.getElementById('workLocation').value = workLocation;
            document.getElementById('address').value = address;
            document.getElementById('station').value = station;
            document.getElementById('telephone').value = telephone;
            document.getElementById('sectionName').value = sectionName;
            document.getElementById('folderName').value = folder;
            document.getElementById('tags').value = tags;
            document.getElementById('isActive').value = isActive;
            
            document.getElementById('startTime').value = startTime;
            document.getElementById('endTime').value = endTime;
            
            // 休憩時間のクリアと再生成
            document.getElementById('breaksContainer').innerHTML = '';
            if (breaksStr) {
                breaksStr.split(',').forEach(b => {
                    const parts = b.split('-');
                    if (parts.length === 2) {
                        addBreakRow(parts[0], parts[1]);
                    }
                });
            } else {
                addBreakRow('12:00', '13:00');
            }
            
            document.getElementById('maxHours').value = maxHours;
            document.getElementById('minHours').value = minHours;

            // アクションとUIの書き換え
            const contextPath = /*[[@{/}]]*/ '/';
            const cleanContextPath = contextPath.endsWith('/') ? contextPath.slice(0, -1) : contextPath;
            scheduleForm.action = cleanContextPath + '/admin/work-schedules/' + classId + '/update';
            
            formTitle.innerHTML = '勤務クラス編集';
            submitBtnText.innerText = '勤務クラスを更新する';

            // モーダルを開く
            openModal('scheduleModal');
        }

        // 新規登録モードに戻す（キャンセル）
        function cancelEditMode() {
            // フォームのクリア
            scheduleForm.reset();
            
            // アクションとUIの復元
            const contextPath = /*[[@{/}]]*/ '/';
            const cleanContextPath = contextPath.endsWith('/') ? contextPath.slice(0, -1) : contextPath;
            scheduleForm.action = cleanContextPath + '/admin/work-schedules/create';
            
            formTitle.innerHTML = '勤務クラス新規登録';
            submitBtnText.innerText = '勤務クラスを登録する';

            // 休憩時間のクリアと初期化
            document.getElementById('breaksContainer').innerHTML = '';
            addBreakRow('12:00', '13:00');
        }

        // リアルタイムフィルタリングロジック
        let activeTags = new Set();

        // フォルダリストとタグクラウドをカード群から集約して生成
        function initializeFilters() {
            const cards = document.querySelectorAll('.work-class-card');
            const folders = new Set();
            const tagsMap = new Set();

            cards.forEach(card => {
                const folder = card.getAttribute('data-folder');
                if (folder && folder.trim() !== '') {
                    folders.add(folder.trim());
                }

                const tagsStr = card.getAttribute('data-tags');
                if (tagsStr && tagsStr.trim() !== '') {
                    tagsStr.split(',').forEach(t => {
                        if (t.trim() !== '') {
                            tagsMap.add(t.trim());
                        }
                    });
                }
            });

            // フォルダフィルタのドロップダウン生成
            const folderFilter = document.getElementById('folderFilter');
            while (folderFilter.options.length > 1) {
                folderFilter.remove(1);
            }
            folders.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.innerText = f;
                folderFilter.appendChild(opt);
            });

            // タグクラウド生成
            const tagCloud = document.getElementById('tagCloud');
            tagCloud.innerHTML = '';
            
            if (tagsMap.size === 0) {
                tagCloud.innerHTML = '<span class="text-txt-secondary/60 text-xs font-semibold">設定されているタグはありません。</span>';
            } else {
                tagsMap.forEach(t => {
                    const badge = document.createElement('span');
                    badge.className = 'cursor-pointer px-3 py-1 rounded-full text-xs font-semibold select-none bg-glass-input/60 border border-glass-border text-txt-secondary transition-all duration-200 hover:bg-glass-input';
                    badge.innerText = t;
                    badge.onclick = () => toggleTagFilter(badge, t);
                    tagCloud.appendChild(badge);
                });
            }
        }

        function toggleTagFilter(element, tag) {
            if (activeTags.has(tag)) {
                activeTags.delete(tag);
                element.classList.remove('active', 'bg-primary', 'text-white', 'border-primary', 'shadow-[0_0_8px_rgba(37,99,235,0.4)]');
                element.classList.add('bg-glass-input/60', 'text-txt-secondary', 'border-glass-border');
            } else {
                activeTags.add(tag);
                element.classList.add('active', 'bg-primary', 'text-white', 'border-primary', 'shadow-[0_0_8px_rgba(37,99,235,0.4)]');
                element.classList.remove('bg-glass-input/60', 'text-txt-secondary', 'border-glass-border');
            }
            filterSchedules();
        }

        // リアルタイムフィルタ処理
        function filterSchedules() {
            const folderVal = document.getElementById('folderFilter').value;
            const cards = document.querySelectorAll('.work-class-card');
            const noResults = document.getElementById('noResults');
            
            let visibleCount = 0;

            cards.forEach(card => {
                const folder = card.getAttribute('data-folder') || '';
                const tagsStr = card.getAttribute('data-tags') || '';

                const matchFolder = !folderVal || folder === folderVal;

                let matchTags = true;
                if (activeTags.size > 0) {
                    const cardTags = tagsStr.split(',').map(t => t.trim());
                    matchTags = Array.from(activeTags).every(t => cardTags.includes(t));
                }

                if (matchFolder && matchTags) {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            if (visibleCount === 0 && cards.length > 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
            }
        }

        // 初回ロード時の初期化
        document.addEventListener('DOMContentLoaded', () => {
            initializeFilters();
            
            // デフォルトの休憩時間を1件追加
            addBreakRow('12:00', '13:00');
            
            // フォーム送信時のチェック
            scheduleForm.addEventListener('submit', function(e) {
                const startInputs = document.getElementsByName('breakStartTimes');
                const endInputs = document.getElementsByName('breakEndTimes');
                
                for (let i = 0; i < startInputs.length; i++) {
                    const start = startInputs[i].value;
                    const end = endInputs[i].value;
                    
                    if (!start || !end) {
                        alert(`休憩${i+1}の開始時刻と終了時刻は両方入力してください。`);
                        e.preventDefault();
                        return;
                    }
                    if (start === end) {
                        alert(`休憩${i+1}の開始時刻と終了時刻を同じにすることはできません。`);
                        e.preventDefault();
                        return;
                    }
                }
            });
        });
        
        /*]]*/
        </script>
    </th:block>
</body>
</html>
