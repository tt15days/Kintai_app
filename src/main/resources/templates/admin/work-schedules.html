<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='schedules'">
<head>
    <title>勤務クラス設定</title>
</head>
<body>
    <h2 layout:fragment="page-title" class="text-2xl font-bold text-txt-primary flex items-center gap-2">
        <i class="fa-solid fa-calendar-alt text-primary"></i> 勤務クラス設定
    </h2>

    <div layout:fragment="content">
        <!-- メッセージ表示 -->
        <div th:if="${successMessage}" class="alert alert-success items-start gap-4">
            <span class="flex items-start gap-2 flex-1 min-w-0 break-all">
                <i class="fa-solid fa-check-circle mt-0.5 shrink-0"></i> 
                <span th:text="${successMessage}"></span>
            </span>
            <button type="button" class="text-txt-primary hover:opacity-75 transition-opacity shrink-0 mt-0.5" onclick="this.parentElement.remove()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger items-start gap-4">
            <span class="flex items-start gap-2 flex-1 min-w-0 break-all">
                <i class="fa-solid fa-exclamation-circle mt-0.5 shrink-0"></i> 
                <span th:text="${errorMessage}"></span>
            </span>
            <button type="button" class="text-txt-primary hover:opacity-75 transition-opacity shrink-0 mt-0.5" onclick="this.parentElement.remove()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="space-y-6">
            <!-- 登録済み勤務クラス一覧のヘッダー -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <h3 class="text-lg font-bold text-txt-primary flex items-center gap-2">
                    <i class="fa-solid fa-list text-primary"></i> 登録済み勤務クラス一覧
                </h3>
                <button type="button" onclick="openCreateModal()" class="btn btn-primary gap-2 text-sm w-full sm:w-auto">
                    <i class="fa-solid fa-plus-circle"></i> 新規登録
                </button>
            </div>
            
            <!-- 検索・フィルターパネル -->
            <div class="card-sm mb-6 flex flex-wrap gap-4 items-center">
                <div class="flex flex-col gap-1.5 flex-1 min-w-[200px]">
                    <label class="text-xs font-bold text-txt-secondary flex items-center gap-1" for="folderFilter">
                        <i class="fa-solid fa-folder text-primary"></i> フォルダ分類
                    </label>
                    <select id="folderFilter" class="form-select py-1.5 text-sm" onchange="filterSchedules()">
                        <option value="">すべて</option>
                        <!-- JSでフォルダ一覧を動的に生成します -->
                    </select>
                </div>
                <div class="w-full">
                    <label class="text-xs font-bold text-txt-secondary flex items-center gap-1 mb-1.5">
                        <i class="fa-solid fa-tags text-primary"></i> タグで絞り込む
                    </label>
                    <div class="flex flex-wrap gap-2 mt-1" id="tagCloud">
                        <!-- JSでタグ一覧を動的に生成します -->
                    </div>
                </div>
            </div>

            <!-- タイル（グリッド）表示 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="scheduleList">
                <div class="card work-class-card" 
                     th:each="schedule : ${workScheduleClasses}"
                     th:data-id="${schedule.classId}"
                     th:data-name="${schedule.name}"
                     th:data-work-location="${schedule.workLocation}"
                     th:data-address="${schedule.address}"
                     th:data-station="${schedule.station}"
                     th:data-telephone="${schedule.telephone}"
                     th:data-section-name="${schedule.sectionName}"
                     th:data-folder="${schedule.folderName}"
                     th:data-tags="${schedule.tags}"
                     th:data-is-active="${schedule.isActive}"
                     th:data-start-time="${#temporals.format(schedule.startTime, 'HH:mm')}"
                     th:data-end-time="${#temporals.format(schedule.endTime, 'HH:mm')}"
                     th:data-break-start-time="${#temporals.format(schedule.breakStartTime, 'HH:mm')}"
                     th:data-break-end-time="${#temporals.format(schedule.breakEndTime, 'HH:mm')}"
                     th:data-break-start-time2="${schedule.breakStartTime2 != null ? #temporals.format(schedule.breakStartTime2, 'HH:mm') : ''}"
                     th:data-break-end-time2="${schedule.breakEndTime2 != null ? #temporals.format(schedule.breakEndTime2, 'HH:mm') : ''}"
                     th:data-break-start-time3="${schedule.breakStartTime3 != null ? #temporals.format(schedule.breakStartTime3, 'HH:mm') : ''}"
                     th:data-break-end-time3="${schedule.breakEndTime3 != null ? #temporals.format(schedule.breakEndTime3, 'HH:mm') : ''}"
                     th:data-break-start-time4="${schedule.breakStartTime4 != null ? #temporals.format(schedule.breakStartTime4, 'HH:mm') : ''}"
                     th:data-break-end-time4="${schedule.breakEndTime4 != null ? #temporals.format(schedule.breakEndTime4, 'HH:mm') : ''}"
                     th:data-max-hours="${schedule.maxHours}"
                     th:data-min-hours="${schedule.minHours}"
                     th:classappend="${schedule.isActive != null and !schedule.isActive} ? 'opacity-60' : ''">
                    
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-base font-bold text-txt-primary" th:text="${schedule.name}">Standard Shift</h4>
                        <div>
                            <span th:if="${schedule.isActive == null or schedule.isActive}" class="badge badge-success">有効</span>
                            <span th:if="${schedule.isActive != null and !schedule.isActive}" class="badge badge-danger">無効</span>
                        </div>
                    </div>

                    <!-- フォルダとタグの表示 -->
                    <div class="flex flex-wrap gap-2 mb-4 items-center">
                        <span th:if="${schedule.folderName != null and !schedule.folderName.trim().isEmpty()}" class="badge bg-black/5 text-txt-secondary border-glass-border">
                            <i class="fa-solid fa-folder-open text-primary/80"></i> <span th:text="${schedule.folderName}"></span>
                        </span>
                        <span th:if="${schedule.tags == null or schedule.tags.trim().isEmpty()}" class="badge border-accent/20 bg-accent/15 text-accent">
                            <i class="fa-solid fa-tag"></i> <span>未設定</span>
                        </span>
                        <span th:if="${schedule.tags != null and !schedule.tags.trim().isEmpty()}" th:each="tag : ${#strings.arraySplit(schedule.tags, ',')}" class="badge border-accent/20 bg-accent/15 text-accent">
                            <i class="fa-solid fa-tag"></i> <span th:text="${tag.trim()}"></span>
                        </span>
                    </div>
                    
                    <div class="text-txt-secondary mb-6 text-sm flex flex-col gap-2">
                        <div>
                            <i class="fa-solid fa-location-dot mr-2 w-5 text-center inline-block text-txt-secondary/60"></i> 
                            勤務地: <span th:text="${schedule.workLocation != null and !schedule.workLocation.isEmpty() ? schedule.workLocation : '未指定'}">本社</span>
                        </div>
                        <div>
                            <i class="fa-solid fa-train mr-2 w-5 text-center inline-block text-txt-secondary/60"></i> 
                            最寄り駅: <span th:text="${schedule.station != null and !schedule.station.isEmpty() ? schedule.station : '未指定'}">六本木駅</span>
                        </div>
                        <div>
                            <i class="fa-regular fa-clock mr-2 w-5 text-center inline-block text-txt-secondary/60"></i> 
                            勤務時間: <span class="font-mono text-txt-primary font-bold" th:text="${#temporals.format(schedule.startTime, 'HH:mm')} + ' - ' + ${#temporals.format(schedule.endTime, 'HH:mm')}">09:00 - 18:00</span>
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <!-- 編集ボタン -->
                        <button type="button" class="btn btn-flat flex-1 text-sm py-2" th:onclick="'enterEditMode(this, ' + ${schedule.classId} + ')'">
                            <i class="fa-solid fa-pen-to-square"></i> 編集
                        </button>
                        <!-- 削除ボタン -->
                        <form th:action="@{/admin/work-schedules/{classId}/delete(classId=${schedule.classId})}" method="post" class="flex-1 m-0"
                              onclick="return confirm('この勤務クラスを削除しますか？紐づく従業員の時間計算に影響を与える場合があります。')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-danger w-full text-sm py-2">
                                <i class="fa-solid fa-trash"></i> 削除
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${workScheduleClasses.isEmpty()}" class="card text-center p-12">
                <p class="text-txt-secondary m-0 flex items-center justify-center gap-2"><i class="fa-solid fa-inbox text-lg"></i> 登録済みの勤務クラスはありません。</p>
            </div>
            
            <!-- 検索結果がゼロの場合のプレースホルダー -->
            <div id="noResults" class="card text-center p-12" style="display: none;">
                <p class="text-txt-secondary m-0 flex items-center justify-center gap-2"><i class="fa-solid fa-search-minus text-lg"></i> 該当する勤務クラスはありません。</p>
            </div>
        </div>

    </div>

    <th:block layout:fragment="modals">
        <!-- 勤務クラス登録・編集モーダル -->
        <div id="scheduleModal" class="absolute inset-0 z-[2000] overflow-y-auto bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300" onclick="cancelEditMode(); closeModal()">
            <div class="flex min-h-full items-center justify-center p-4">
                <div id="modalContent" class="card-heavy w-full max-w-2xl transform scale-95 transition-all duration-300" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-start mb-6 gap-4">
                        <h3 id="formTitle" class="text-base sm:text-lg font-bold text-txt-primary flex items-center gap-2 flex-1 min-w-0 break-words">
                            <i class="fa-solid fa-plus-circle text-primary shrink-0"></i> 勤務クラス新規登録
                        </h3>
                        <button type="button" class="text-txt-primary hover:opacity-75 transition-opacity shrink-0 mt-0.5" onclick="cancelEditMode(); closeModal()">
                            <i class="fa-solid fa-xmark text-xl"></i>
                        </button>
                    </div>

                    <form id="scheduleForm" th:action="@{/admin/work-schedules/create}" method="post" class="space-y-4">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-txt-secondary flex items-center gap-1" for="name">
                                勤務クラス名 <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="name" name="name" class="form-input" placeholder="例) 本社標準勤務、テレワーク勤務" required>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="folderName">フォルダ分類</label>
                                <input type="text" id="folderName" name="folderName" class="form-input" placeholder="例) 本社、開発部">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="tags">タグ (カンマ区切り)</label>
                                <input type="text" id="tags" name="tags" class="form-input" placeholder="例) 時短,シフト">
                            </div>
                        </div>

                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-txt-secondary" for="workLocation">勤務地</label>
                            <input type="text" id="workLocation" name="workLocation" class="form-input" placeholder="例) 本社、在宅、支店等">
                        </div>

                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-txt-secondary" for="address">住所</label>
                            <input type="text" id="address" name="address" class="form-input" placeholder="例) 東京都港区〇〇1-2-3">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="station">最寄り駅</label>
                                <input type="text" id="station" name="station" class="form-input" placeholder="例) 六本木駅">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="telephone">電話番号</label>
                                <input type="tel" id="telephone" name="telephone" class="form-input" placeholder="例) 03-1234-5678">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="sectionName">所属部署</label>
                                <input type="text" id="sectionName" name="sectionName" class="form-input" placeholder="例) 営業部">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="isActive">状態</label>
                                <select id="isActive" name="isActive" class="form-select">
                                    <option value="true" selected>有効</option>
                                    <option value="false">無効</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary flex items-center gap-1" for="startTime">
                                    始業時刻 <span class="text-danger">*</span>
                                </label>
                                <input type="time" id="startTime" name="startTime" class="form-input font-mono" required value="09:00">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary flex items-center gap-1" for="endTime">
                                    終業時刻 <span class="text-danger">*</span>
                                </label>
                                <input type="time" id="endTime" name="endTime" class="form-input font-mono" required value="18:00">
                            </div>
                        </div>

                        <!-- 休憩時間1 (必須) -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary flex items-center gap-1" for="breakStartTime">
                                    休憩1開始時刻 <span class="text-danger">*</span>
                                </label>
                                <input type="time" id="breakStartTime" name="breakStartTime" class="form-input font-mono" required value="12:00">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary flex items-center gap-1" for="breakEndTime">
                                    休憩1終了時刻 <span class="text-danger">*</span>
                                </label>
                                <input type="time" id="breakEndTime" name="breakEndTime" class="form-input font-mono" required value="13:00">
                            </div>
                        </div>

                        <!-- 休憩2〜4のアコーディオン (任意) -->
                        <button type="button" class="w-full flex justify-between items-center p-3 rounded-xl text-sm font-semibold text-txt-primary bg-glass/40 border border-glass-border hover:bg-glass/80 transition-colors mb-4 cursor-pointer" onclick="toggleAccordion('breakAccordion')">
                            <span class="flex items-center gap-2"><i class="fa-solid fa-clock text-primary"></i> 休憩時間を追加設定 (休憩2〜4)</span>
                            <i class="fa-solid fa-chevron-down transition-transform duration-200" id="accordionIcon"></i>
                        </button>
                        <div id="breakAccordion" class="max-h-0 overflow-hidden transition-all duration-300 ease-out px-1 space-y-4">
                            <!-- 休憩2 -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="flex flex-col gap-1.5">
                                    <label class="text-sm font-semibold text-txt-secondary" for="breakStartTime2">休憩2開始時刻</label>
                                    <input type="time" id="breakStartTime2" name="breakStartTime2" class="form-input font-mono">
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label class="text-sm font-semibold text-txt-secondary" for="breakEndTime2">休憩2終了時刻</label>
                                    <input type="time" id="breakEndTime2" name="breakEndTime2" class="form-input font-mono">
                                </div>
                            </div>
                            <!-- 休憩3 -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="flex flex-col gap-1.5">
                                    <label class="text-sm font-semibold text-txt-secondary" for="breakStartTime3">休憩3開始時刻</label>
                                    <input type="time" id="breakStartTime3" name="breakStartTime3" class="form-input font-mono">
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label class="text-sm font-semibold text-txt-secondary" for="breakEndTime3">休憩3終了時刻</label>
                                    <input type="time" id="breakEndTime3" name="breakEndTime3" class="form-input font-mono">
                                </div>
                            </div>
                            <!-- 休憩4 -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="flex flex-col gap-1.5">
                                    <label class="text-sm font-semibold text-txt-secondary" for="breakStartTime4">休憩4開始時刻</label>
                                    <input type="time" id="breakStartTime4" name="breakStartTime4" class="form-input font-mono">
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label class="text-sm font-semibold text-txt-secondary" for="breakEndTime4">休憩4終了時刻</label>
                                    <input type="time" id="breakEndTime4" name="breakEndTime4" class="form-input font-mono">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="maxHours">最大勤務時間</label>
                                <input type="number" id="maxHours" name="maxHours" class="form-input font-mono" placeholder="例) 10" min="1" max="24">
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-txt-secondary" for="minHours">最小勤務時間</label>
                                <input type="number" id="minHours" name="minHours" class="form-input font-mono" placeholder="例) 4" min="1" max="24">
                            </div>
                        </div>

                        <div class="flex flex-col-reverse sm:flex-row gap-3 mt-4">
                            <button type="button" onclick="cancelEditMode(); closeModal()" class="btn btn-flat sm:flex-1 w-full">
                                キャンセル
                            </button>
                            <button type="submit" id="submitBtn" class="btn btn-primary sm:flex-[2] w-full">
                                <i class="fa-solid fa-save"></i> <span id="submitBtnText">勤務クラスを登録する</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </th:block>

    <!-- JavaScript 処理 -->
    <th:block layout:fragment="js">
        <script th:inline="javascript">
            /*<![CDATA[*/
        
        // アコーディオンの制御
        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById('accordionIcon');
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                content.classList.add('max-h-0');
                content.classList.remove('max-h-[500px]', 'pb-4');
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('open');
                content.classList.remove('max-h-0');
                content.classList.add('max-h-[500px]', 'pb-4');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        // モーダルの開閉
        function openModal() {
            const modal = document.getElementById('scheduleModal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.classList.add('opacity-100', 'pointer-events-auto');
            const content = document.getElementById('modalContent');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
        }

        function closeModal() {
            const modal = document.getElementById('scheduleModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.classList.remove('opacity-100', 'pointer-events-auto');
            const content = document.getElementById('modalContent');
            content.classList.add('scale-95');
            content.classList.remove('scale-100');
        }

        // 新規登録モーダルを開く
        function openCreateModal() {
            cancelEditMode();
            openModal();
        }

        // 編集モード関連変数
        const scheduleForm = document.getElementById('scheduleForm');
        const formTitle = document.getElementById('formTitle');
        const submitBtnText = document.getElementById('submitBtnText');
        
        // 編集モードに入る
        function enterEditMode(button, classId) {
            // 対象のカードからデータを取得
            const card = button.closest('.work-class-card');
            
            const name = card.getAttribute('data-name');
            const workLocation = card.getAttribute('data-work-location') || '';
            const address = card.getAttribute('data-address') || '';
            const station = card.getAttribute('data-station') || '';
            const telephone = card.getAttribute('data-telephone') || '';
            const sectionName = card.getAttribute('data-section-name') || '';
            const folder = card.getAttribute('data-folder') || '';
            const tags = card.getAttribute('data-tags') || '';
            const isActive = card.getAttribute('data-is-active') || 'true';
            
            const startTime = card.getAttribute('data-start-time');
            const endTime = card.getAttribute('data-end-time');
            const breakStartTime = card.getAttribute('data-break-start-time') || '';
            const breakEndTime = card.getAttribute('data-break-end-time') || '';
            const breakStartTime2 = card.getAttribute('data-break-start-time2') || '';
            const breakEndTime2 = card.getAttribute('data-break-end-time2') || '';
            const breakStartTime3 = card.getAttribute('data-break-start-time3') || '';
            const breakEndTime3 = card.getAttribute('data-break-end-time3') || '';
            const breakStartTime4 = card.getAttribute('data-break-start-time4') || '';
            const breakEndTime4 = card.getAttribute('data-break-end-time4') || '';
            
            const maxHours = card.getAttribute('data-max-hours') || '';
            const minHours = card.getAttribute('data-min-hours') || '';

            // フォームの値を設定
            document.getElementById('name').value = name;
            document.getElementById('workLocation').value = workLocation;
            document.getElementById('address').value = address;
            document.getElementById('station').value = station;
            document.getElementById('telephone').value = telephone;
            document.getElementById('sectionName').value = sectionName;
            document.getElementById('folderName').value = folder;
            document.getElementById('tags').value = tags;
            document.getElementById('isActive').value = isActive;
            
            document.getElementById('startTime').value = startTime;
            document.getElementById('endTime').value = endTime;
            document.getElementById('breakStartTime').value = breakStartTime;
            document.getElementById('breakEndTime').value = breakEndTime;
            document.getElementById('breakStartTime2').value = breakStartTime2;
            document.getElementById('breakEndTime2').value = breakEndTime2;
            document.getElementById('breakStartTime3').value = breakStartTime3;
            document.getElementById('breakEndTime3').value = breakEndTime3;
            document.getElementById('breakStartTime4').value = breakStartTime4;
            document.getElementById('breakEndTime4').value = breakEndTime4;
            
            document.getElementById('maxHours').value = maxHours;
            document.getElementById('minHours').value = minHours;

            // アクションとUIの書き換え
            const contextPath = /*[[@{/}]]*/ '/';
            // ダブルスラッシュを防ぐ正規化
            const cleanContextPath = contextPath.endsWith('/') ? contextPath.slice(0, -1) : contextPath;
            scheduleForm.action = cleanContextPath + '/admin/work-schedules/' + classId + '/update';
            
            formTitle.innerHTML = '<i class="fa-solid fa-edit text-accent animate-pulse"></i> 勤務クラス編集';
            submitBtnText.innerText = '勤務クラスを更新する';

            // 任意休憩時間に入力があれば自動的にアコーディオンを開く
            if (breakStartTime2 || breakStartTime3 || breakStartTime4) {
                const content = document.getElementById('breakAccordion');
                const icon = document.getElementById('accordionIcon');
                content.classList.add('open');
                content.classList.remove('max-h-0');
                content.classList.add('max-h-[500px]', 'pb-4');
                icon.style.transform = 'rotate(180deg)';
            }

            // モーダルを開く
            openModal();
        }

        // 新規登録モードに戻す（キャンセル）
        function cancelEditMode() {
            // フォームのクリア
            scheduleForm.reset();
            
            // アクションとUIの復元
            const contextPath = /*[[@{/}]]*/ '/';
            const cleanContextPath = contextPath.endsWith('/') ? contextPath.slice(0, -1) : contextPath;
            scheduleForm.action = cleanContextPath + '/admin/work-schedules/create';
            
            formTitle.innerHTML = '<i class="fa-solid fa-plus-circle text-primary"></i> 勤務クラス新規登録';
            submitBtnText.innerText = '勤務クラスを登録する';

            // アコーディオンを閉じる
            const content = document.getElementById('breakAccordion');
            const icon = document.getElementById('accordionIcon');
            content.classList.remove('open');
            content.classList.add('max-h-0');
            content.classList.remove('max-h-[500px]', 'pb-4');
            icon.style.transform = 'rotate(0deg)';
        }

        // リアルタイムフィルタリングロジック
        let activeTags = new Set();

        // フォルダリストとタグクラウドをカード群から集約して生成
        function initializeFilters() {
            const cards = document.querySelectorAll('.work-class-card');
            const folders = new Set();
            const tagsMap = new Set();

            cards.forEach(card => {
                const folder = card.getAttribute('data-folder');
                if (folder && folder.trim() !== '') {
                    folders.add(folder.trim());
                }

                const tagsStr = card.getAttribute('data-tags');
                if (tagsStr && tagsStr.trim() !== '') {
                    tagsStr.split(',').forEach(t => {
                        if (t.trim() !== '') {
                            tagsMap.add(t.trim());
                        }
                    });
                }
            });

            // フォルダフィルタのドロップダウン生成
            const folderFilter = document.getElementById('folderFilter');
            // 既存の動的オプションをクリア
            while (folderFilter.options.length > 1) {
                folderFilter.remove(1);
            }
            folders.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.innerText = f;
                folderFilter.appendChild(opt);
            });

            // タグクラウド生成
            const tagCloud = document.getElementById('tagCloud');
            tagCloud.innerHTML = '';
            
            if (tagsMap.size === 0) {
                tagCloud.innerHTML = '<span class="text-txt-secondary/60 text-xs font-semibold">設定されているタグはありません。</span>';
            } else {
                tagsMap.forEach(t => {
                    const badge = document.createElement('span');
                    badge.className = 'cursor-pointer px-3 py-1 rounded-full text-xs font-semibold select-none bg-glass-input/60 border border-glass-border text-txt-secondary transition-all duration-200 hover:bg-glass-input';
                    badge.innerText = t;
                    badge.onclick = () => toggleTagFilter(badge, t);
                    tagCloud.appendChild(badge);
                });
            }
        }

        function toggleTagFilter(element, tag) {
            if (activeTags.has(tag)) {
                activeTags.delete(tag);
                element.classList.remove('active', 'bg-primary', 'text-white', 'border-primary', 'shadow-[0_0_8px_rgba(37,99,235,0.4)]');
                element.classList.add('bg-glass-input/60', 'text-txt-secondary', 'border-glass-border');
            } else {
                activeTags.add(tag);
                element.classList.add('active', 'bg-primary', 'text-white', 'border-primary', 'shadow-[0_0_8px_rgba(37,99,235,0.4)]');
                element.classList.remove('bg-glass-input/60', 'text-txt-secondary', 'border-glass-border');
            }
            filterSchedules();
        }

        // リアルタイムフィルタ処理
        function filterSchedules() {
            const folderVal = document.getElementById('folderFilter').value;
            const cards = document.querySelectorAll('.work-class-card');
            const noResults = document.getElementById('noResults');
            
            let visibleCount = 0;

            cards.forEach(card => {
                const folder = card.getAttribute('data-folder') || '';
                const tagsStr = card.getAttribute('data-tags') || '';

                // 1. フォルダフィルタ
                const matchFolder = !folderVal || folder === folderVal;

                // 2. タグフィルタ
                let matchTags = true;
                if (activeTags.size > 0) {
                    const cardTags = tagsStr.split(',').map(t => t.trim());
                    // 選択された全てのタグをカードが持っているか確認
                    matchTags = Array.from(activeTags).every(t => cardTags.includes(t));
                }

                if (matchFolder && matchTags) {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            if (visibleCount === 0 && cards.length > 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
            }
        }

        // 初回ロード時の初期化
        document.addEventListener('DOMContentLoaded', () => {
            initializeFilters();
            
            // フォーム送信時のチェック
            scheduleForm.addEventListener('submit', function(e) {
                // 休憩時間2〜4の整合性バリデーション
                for (let i = 2; i <= 4; i++) {
                    const start = document.getElementById(`breakStartTime${i}`).value;
                    const end = document.getElementById(`breakEndTime${i}`).value;
                    
                    if ((start && !end) || (!start && end)) {
                        alert(`休憩${i}の開始時刻と終了時刻は両方入力するか、両方空欄にしてください。`);
                        e.preventDefault();
                        return;
                    }
                    if (start && end && start === end) {
                        alert(`休憩${i}の開始時刻と終了時刻を同じにすることはできません。`);
                        e.preventDefault();
                        return;
                    }
                }
            });
        });
        
        /*]]*/
        </script>
    </th:block>
</body>
</html>
