<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="activePage='announcements'">
<head>
    <title>お知らせ管理 - 管理</title>
</head>
<body>
    <h2 layout:fragment="page-title" class="text-2xl font-bold text-txt-primary flex items-center gap-2">
        <i class="fas fa-bullhorn text-primary"></i> お知らせ管理
    </h2>

    <div layout:fragment="content">
        <!-- フラッシュメッセージ -->
        <div th:if="${successMessage}" class="alert alert-success" role="status" aria-live="polite">
            <span><i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span></span>
            <button type="button" class="icon-button text-txt-primary hover:opacity-100 opacity-70 transition-opacity bg-transparent border-0 text-xl leading-none cursor-pointer" onclick="this.parentElement.remove()" aria-label="閉じる">×</button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert" aria-live="assertive">
            <span><i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span></span>
            <button type="button" class="icon-button text-txt-primary hover:opacity-100 opacity-70 transition-opacity bg-transparent border-0 text-xl leading-none cursor-pointer" onclick="this.parentElement.remove()" aria-label="閉じる">×</button>
        </div>

        <!-- 新規登録フォーム -->
        <div class="card mb-6">
            <div class="pb-4 mb-4 border-b border-glass-border/30">
                <h5 class="text-base font-bold text-txt-primary flex items-center gap-1.5"><i class="fas fa-plus-circle text-primary"></i> 新規お知らせ登録</h5>
            </div>
            <div>
                <form th:action="@{/admin/announcements/create}" method="post" class="space-y-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-3">
                            <label for="title" class="form-label">タイトル <span class="text-danger font-bold">*</span></label>
                            <input type="text" class="form-input" id="title" name="title"
                                   maxlength="200" required placeholder="例: 年末年始の業務について">
                        </div>
                        <div class="md:col-span-3">
                            <label for="message" class="form-label">本文 <span class="text-danger font-bold">*</span></label>
                            <textarea class="form-textarea" id="message" name="message"
                                      rows="3" maxlength="2000" required placeholder="お知らせ内容を入力してください"></textarea>
                        </div>
                        <div>
                            <label for="displayStartDate" class="form-label">表示開始日 <span class="text-danger font-bold">*</span></label>
                            <input type="date" class="form-input" id="displayStartDate" name="displayStartDate"
                                   th:value="${today}" required>
                        </div>
                        <div>
                            <label for="displayEndDate" class="form-label">表示終了日 <span class="text-txt-secondary opacity-70">(空欄=期限なし)</span></label>
                            <input type="date" class="form-input" id="displayEndDate" name="displayEndDate">
                        </div>
                        <div class="md:col-span-3 pt-2">
                            <button type="submit" class="btn btn-primary gap-2 text-sm">
                                <i class="fas fa-save"></i> 登録する
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- お知らせ一覧 -->
        <div class="card">
            <div class="pb-4 mb-4 border-b border-glass-border/30">
                <h5 class="text-base font-bold text-txt-primary flex items-center gap-1.5"><i class="fas fa-bullhorn text-primary"></i> お知らせ一覧
                    <span class="badge bg-black/5 text-txt-secondary border-glass-border ml-2" th:text="${totalAnnouncementCount}">0</span>件
                </h5>
            </div>
            <div>
                <div th:if="${#lists.isEmpty(announcements)}" class="py-6 text-txt-secondary opacity-80 text-center">
                    登録済みのお知らせはありません。
                </div>
                <div th:unless="${#lists.isEmpty(announcements)}" class="table-container">
                    <table class="table-custom">
                        <thead class="bg-black/10 text-txt-primary">
                            <tr>
                                <th class="w-44">タイトル</th>
                                <th>本文</th>
                                <th class="w-28">開始日</th>
                                <th class="w-28">終了日</th>
                                <th class="w-16">状態</th>
                                <th class="w-40">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-glass-border/10">
                            <tr th:each="ann : ${announcements}">
                                <td class="font-semibold" th:text="${ann.title}"></td>
                                <td class="max-w-xs whitespace-pre-wrap break-words" th:text="${ann.message}"></td>
                                <td class="font-mono" th:text="${ann.displayStartDate != null ? #temporals.format(ann.displayStartDate.atZone(jstZoneId), 'yyyy/MM/dd') : '-'}"></td>
                                <td class="font-mono" th:text="${ann.displayEndDate != null ? #temporals.format(ann.displayEndDate.atZone(jstZoneId), 'yyyy/MM/dd') : '期限なし'}"></td>
                                <td>
                                    <span th:if="${ann.isActive}" class="badge badge-success">有効</span>
                                    <span th:unless="${ann.isActive}" class="badge bg-black/5 text-txt-secondary border-glass-border">無効</span>
                                </td>
                                <td>
                                    <div class="flex gap-2">
                                        <!-- 編集ボタン（JS制御モーダルトリガー） -->
                                        <button type="button"
                                                class="btn btn-primary min-w-11 p-2 rounded-lg text-xs"
                                                th:aria-label="|${ann.title}を編集|"
                                                th:data-action="@{/admin/announcements/{id}/update(id=${ann.announcementId})}"
                                                th:data-title="${ann.title}"
                                                th:data-message="${ann.message}"
                                                th:data-active="${ann.isActive}"
                                                th:data-start-date="${ann.displayStartDate != null ? #temporals.format(ann.displayStartDate.atZone(jstZoneId), 'yyyy-MM-dd') : ''}"
                                                th:data-end-date="${ann.displayEndDate != null ? #temporals.format(ann.displayEndDate.atZone(jstZoneId), 'yyyy-MM-dd') : ''}"
                                                onclick="openAnnouncementEdit(this)">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <!-- 削除ボタン -->
                                        <form th:action="@{/admin/announcements/{id}/delete(id=${ann.announcementId})}"
                                              method="post" class="inline m-0"
                                              onsubmit="return confirm('このお知らせを削除しますか？');">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <input type="hidden" name="page" th:value="${currentPage}"/>
                                            <input type="hidden" name="size" th:value="${pageSize}"/>
                                            <button type="submit" class="btn btn-danger min-w-11 p-2 rounded-lg text-xs"
                                                    th:aria-label="|${ann.title}を削除|">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <nav th:if="${totalPages > 1}" class="mt-5 flex flex-wrap items-center justify-center gap-2"
                     aria-label="お知らせ一覧のページ">
                    <a th:if="${currentPage > 0}"
                       th:href="@{/admin/announcements(page=${currentPage - 1},size=${pageSize})}"
                       class="btn btn-flat min-w-11" aria-label="前のページ">前へ</a>
                    <span th:unless="${currentPage > 0}" class="btn btn-flat min-w-11 opacity-50" aria-disabled="true">前へ</span>
                    <a th:each="pageNumber : ${pageNumbers}"
                       th:href="@{/admin/announcements(page=${pageNumber},size=${pageSize})}"
                       th:text="${pageNumber + 1}"
                       th:aria-current="${pageNumber == currentPage} ? 'page' : null"
                       th:class="${pageNumber == currentPage} ? 'btn btn-primary min-w-11' : 'btn btn-flat min-w-11'">1</a>
                    <a th:if="${currentPage + 1 < totalPages}"
                       th:href="@{/admin/announcements(page=${currentPage + 1},size=${pageSize})}"
                       class="btn btn-flat min-w-11" aria-label="次のページ">次へ</a>
                    <span th:unless="${currentPage + 1 < totalPages}" class="btn btn-flat min-w-11 opacity-50" aria-disabled="true">次へ</span>
                </nav>
            </div>
        </div>

    </div>

    <th:block layout:fragment="modals">
        <!-- 一覧で共用する編集モーダル -->
        <div id="announcementEditModal"
             class="modal announcement-modal absolute inset-0 z-[2000] overflow-y-auto bg-black/60 backdrop-blur-sm hidden transition-all duration-300"
             tabindex="-1" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="announcementEditTitle">
            <div class="flex min-h-full items-center justify-center p-4"
                 onclick="if (event.target === this) closeModal('announcementEditModal')">
                <div class="card-heavy w-full max-w-2xl">
                    <div class="flex items-center justify-between pb-4 border-b border-glass-border/30 mb-4">
                        <h5 id="announcementEditTitle" class="text-base font-bold text-txt-primary flex items-center gap-1.5">
                            <i class="fas fa-edit text-primary"></i> お知らせ編集
                        </h5>
                        <button type="button" class="icon-button text-txt-primary hover:opacity-75 transition-opacity"
                                onclick="closeModal('announcementEditModal')" aria-label="閉じる">
                            <i class="fa-solid fa-xmark text-xl"></i>
                        </button>
                    </div>
                    <form id="announcementEditForm" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="page" th:value="${currentPage}"/>
                        <input type="hidden" name="size" th:value="${pageSize}"/>
                        <div class="space-y-4 py-2">
                            <div>
                                <label for="editAnnouncementTitle" class="form-label">タイトル <span class="text-danger font-bold">*</span></label>
                                <input type="text" id="editAnnouncementTitle" class="form-input" name="title" maxlength="200" required>
                            </div>
                            <div>
                                <label for="editAnnouncementMessage" class="form-label">本文 <span class="text-danger font-bold">*</span></label>
                                <textarea id="editAnnouncementMessage" class="form-textarea" name="message"
                                          rows="6" maxlength="2000" required></textarea>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label for="editAnnouncementStartDate" class="form-label">表示開始日 <span class="text-danger font-bold">*</span></label>
                                    <input type="date" id="editAnnouncementStartDate" class="form-input" name="displayStartDate" required>
                                </div>
                                <div>
                                    <label for="editAnnouncementEndDate" class="form-label">表示終了日</label>
                                    <input type="date" id="editAnnouncementEndDate" class="form-input" name="displayEndDate">
                                    <p class="text-xs text-txt-secondary mt-1">未指定の場合は期限なしで掲載されます</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" name="isActive" id="editAnnouncementActive"
                                       class="w-4 h-4 rounded border-glass-border text-primary focus:ring-primary/50 bg-glass">
                                <label for="editAnnouncementActive" class="choice-label text-sm font-medium text-txt-primary">アクティブ（掲載する）</label>
                            </div>
                        </div>
                        <div class="flex flex-col-reverse sm:flex-row gap-3 mt-4">
                            <button type="button" class="btn btn-flat flex-1" onclick="closeModal('announcementEditModal')">キャンセル</button>
                            <button type="submit" class="btn btn-primary flex-[2]">
                                <i class="fa-solid fa-save"></i> 保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </th:block>

    <th:block layout:fragment="js">
        <script>
            function openAnnouncementEdit(button) {
                const form = document.getElementById('announcementEditForm');
                form.action = button.dataset.action;
                document.getElementById('editAnnouncementTitle').value = button.dataset.title || '';
                document.getElementById('editAnnouncementMessage').value = button.dataset.message || '';
                document.getElementById('editAnnouncementStartDate').value = button.dataset.startDate || '';
                document.getElementById('editAnnouncementEndDate').value = button.dataset.endDate || '';
                document.getElementById('editAnnouncementActive').checked = button.dataset.active === 'true';
                openModal('announcementEditModal');
            }
        </script>
    </th:block>
</body>
</html>
