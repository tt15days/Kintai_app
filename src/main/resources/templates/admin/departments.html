<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="activePage='departments'">
<head>
    <title>部署管理 - 管理</title>
</head>
<body>
    <h2 layout:fragment="page-title" class="text-2xl font-bold text-txt-primary flex items-center gap-2">
        部署管理
    </h2>

    <div layout:fragment="content">
        <!-- フラッシュメッセージ -->
        <div th:if="${successMessage}" class="alert alert-success" role="status" aria-live="polite">
            <span><span th:text="${successMessage}"></span></span>
            <button type="button" class="icon-button text-txt-primary hover:opacity-100 opacity-70 transition-opacity bg-transparent border-0 text-xl leading-none cursor-pointer" onclick="this.parentElement.remove()" aria-label="閉じる">×</button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert" aria-live="assertive">
            <span><span th:text="${errorMessage}"></span></span>
            <button type="button" class="icon-button text-txt-primary hover:opacity-100 opacity-70 transition-opacity bg-transparent border-0 text-xl leading-none cursor-pointer" onclick="this.parentElement.remove()" aria-label="閉じる">×</button>
        </div>

        <!-- 新規登録フォーム -->
        <div class="card mb-6">
            <div class="pb-4 mb-4 border-b border-glass-border/30">
                <h5 class="text-base font-bold text-txt-primary flex items-center gap-1.5">新規部署登録</h5>
            </div>
            <div>
                <form th:action="@{/admin/departments/create}" method="post" class="flex flex-wrap items-end gap-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="flex-1 min-w-64">
                        <label for="name" class="form-label">部署名 <span class="text-danger font-bold">*</span></label>
                        <input type="text" class="form-input" id="name" name="name"
                               maxlength="100" required placeholder="例: 総務部">
                    </div>
                    <div>
                        <button type="submit" class="btn btn-primary gap-2 text-sm">
                            登録する
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 部署一覧 -->
        <div class="card">
            <div class="pb-4 mb-4 border-b border-glass-border/30">
                <h5 class="text-base font-bold text-txt-primary flex items-center gap-1.5">部署一覧
                    <span class="badge bg-black/5 text-txt-secondary border-glass-border ml-2" th:text="${#lists.size(departments)}">0</span>件
                </h5>
            </div>
            <div>
                <div th:if="${#lists.isEmpty(departments)}" class="py-6 text-txt-secondary opacity-80 text-center">
                    登録済みの部署はありません。
                </div>
                <div th:unless="${#lists.isEmpty(departments)}" class="table-container">
                    <table class="table-custom">
                        <thead class="bg-black/10 text-txt-primary">
                            <tr>
                                <th>部署名</th>
                                <th class="w-24">状態</th>
                                <th class="w-24">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-glass-border/10">
                            <tr th:each="dept : ${departments}">
                                <td class="font-semibold" th:text="${dept.name}"></td>
                                <td>
                                    <span th:if="${dept.isActive}" class="badge badge-success">有効</span>
                                    <span th:unless="${dept.isActive}" class="badge bg-black/5 text-txt-secondary border-glass-border">廃止</span>
                                </td>
                                <td>
                                    <button type="button"
                                            class="btn btn-primary min-w-11 p-2 rounded-lg text-xs"
                                            th:aria-label="|${dept.name}を編集|"
                                            th:onclick="'openEditModal(' + ${dept.departmentId} + ')'">編集</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <p class="text-xs text-txt-secondary mt-3">
                    ※ 部署名を変更すると、所属ユーザー・部署承認者設定・勤務クラスの部署名も自動で更新されます。<br>
                    ※ 所属中の有効なユーザーがいる部署は廃止できません。
                </p>
            </div>
        </div>

    </div>

    <th:block layout:fragment="modals">
        <!-- 編集モーダル（各部署用） -->
        <div th:each="dept : ${departments}">
            <div class="modal hidden"
                 th:id="${'editModal' + dept.departmentId}" tabindex="-1" th:onclick="'closeEditModal(' + ${dept.departmentId} + ')'"
                 role="dialog" aria-modal="true" aria-hidden="true" th:aria-label="|${dept.name}の部署編集|">
                <div class="flex min-h-full items-center justify-center p-4">
                    <div class="card-heavy w-full max-w-lg" onclick="event.stopPropagation()">
                        <div class="flex items-center justify-between pb-4 border-b border-glass-border/30 mb-4">
                            <h5 class="text-base font-bold text-txt-primary flex items-center gap-1.5">部署編集</h5>
                            <button type="button" class="icon-button text-txt-primary hover:opacity-75 transition-opacity text-xl leading-none"
                                    th:onclick="'closeEditModal(' + ${dept.departmentId} + ')'" aria-label="閉じる">×</button>
                        </div>
                        <form th:action="@{/admin/departments/{id}/update(id=${dept.departmentId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="space-y-4 py-2">
                                <div>
                                    <label class="form-label">部署名 <span class="text-danger font-bold">*</span></label>
                                    <input type="text" class="form-input" name="name"
                                           th:value="${dept.name}" maxlength="100" required>
                                </div>
                                <div class="flex items-center gap-2">
                                    <input type="checkbox" name="isActive" value="true" th:id="${'active' + dept.departmentId}"
                                           class="w-4 h-4 rounded border-glass-border text-primary focus:ring-primary/50 bg-glass"
                                           th:checked="${dept.isActive}">
                                    <label th:for="${'active' + dept.departmentId}" class="choice-label text-sm font-medium text-txt-primary">有効（チェックを外すと廃止）</label>
                                </div>
                            </div>
                            <div class="flex gap-4 mt-4">
                                <button type="button" class="btn btn-flat flex-1"
                                        th:onclick="'closeEditModal(' + ${dept.departmentId} + ')'">キャンセル</button>
                                <button type="submit" class="btn btn-primary flex-[2]">
                                    保存
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </th:block>

    <th:block layout:fragment="js">
        <script>
            // openModal/closeModal は main.js の共通ユーティリティを使用
            function openEditModal(id) {
                openModal('editModal' + id);
            }
            function closeEditModal(id) {
                closeModal('editModal' + id);
            }
        </script>
    </th:block>
</body>
</html>
