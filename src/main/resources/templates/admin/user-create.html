<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='users'">

<head>
    <title>ユーザー追加</title>
</head>

<body>
    <h2 layout:fragment="page-title">ユーザー追加</h2>

    <div layout:fragment="content">
        <div class="container mx-auto px-4 py-6">
            <div class="max-w-xl mx-auto">
                <div class="card">
                    <div class="flex items-center justify-between pb-4 mb-6 border-b border-glass-border/30">
                        <h4 class="text-lg font-bold text-txt-primary flex items-center gap-1.5"><i
                                class="fas fa-user-plus text-primary"></i> ユーザー追加</h4>
                    </div>
                    <div>
                        <div th:if="${error}" class="alert alert-danger mb-4" role="alert" aria-live="assertive">
                            <i class="fas fa-exclamation-circle text-lg"></i>
                            <span><strong>エラー:</strong> <span th:text="${error}"></span></span>
                        </div>

                        <div th:if="${success}" class="alert alert-success mb-4" role="status" aria-live="polite">
                            <i class="fas fa-check-circle text-lg"></i>
                            <span><strong>成功:</strong> <span th:text="${success}"></span></span>
                        </div>

                        <form method="post" th:action="@{/admin/users/create}" class="space-y-4">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"
                                th:if="${_csrf != null}" />
                            <div>
                                <label for="email" class="form-label">
                                    メールアドレス <span class="text-danger font-bold">*</span>
                                </label>
                                <input type="email" class="form-input font-mono" id="email" name="email" required
                                    th:value="${email}" placeholder="user@example.com" autocomplete="email">
                                <small class="text-xs text-txt-secondary opacity-70 block mt-1.5">
                                    ログインに使用するメールアドレスを入力してください。
                                </small>
                            </div>

                            <div>
                                <label for="fullName" class="form-label">
                                    氏名 <span class="text-danger font-bold">*</span>
                                </label>
                                <input type="text" class="form-input" id="fullName" name="fullName" required
                                    th:value="${fullName}" placeholder="山田太郎">
                                <small class="text-xs text-txt-secondary opacity-70 block mt-1.5">
                                    ユーザーの表示名を入力してください。
                                </small>
                            </div>

                            <div>
                                <label for="password" class="form-label">
                                    パスワード <span class="text-danger font-bold">*</span>
                                </label>
                                <input type="password" class="form-input font-mono" id="password" name="password"
                                    required placeholder="最小8文字の英数字" autocomplete="new-password">
                                <small class="text-xs text-txt-secondary opacity-70 block mt-1.5">
                                    8文字以上の英数字を含むパスワードを設定してください。
                                </small>
                            </div>

                            <div>
                                <label for="userRole" class="form-label">
                                    ロール <span class="text-danger font-bold">*</span>
                                </label>
                                <select class="form-select" id="userRole" name="userRole" required>
                                    <option value="">-- ロールを選択してください --</option>
                                    <option th:each="role : ${roles}" th:value="${role}"
                                        th:selected="${role == userRole}" th:text="${role.displayName}">
                                    </option>
                                </select>
                                <small class="text-xs text-txt-secondary opacity-70 block mt-1.5">
                                    管理者には全機能へのアクセスが可能になります。
                                </small>
                            </div>

                            <div>
                                <label for="hireDate" class="form-label">
                                    入社日
                                </label>
                                <input type="date" class="form-input" id="hireDate" name="hireDate"
                                    th:value="${hireDate}">
                                <small class="text-xs text-txt-secondary opacity-70 block mt-1.5">
                                    ユーザーの入社日を設定してください。
                                </small>
                            </div>

                            <p class="text-xs text-txt-secondary leading-relaxed">
                                新規ユーザーの有休初期残高と次回付与日数は、ともに10日で作成されます。
                            </p>

                            <hr class="border-glass-border/30 my-6">

                            <div class="flex gap-3 pt-2">
                                <button type="submit" class="btn btn-success gap-2 text-sm">
                                    <i class="fas fa-save"></i> ユーザー追加
                                </button>
                                <a th:href="@{/admin/users}" class="btn btn-flat gap-2 text-sm">
                                    <i class="fas fa-times"></i> キャンセル
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
