<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='users'">

<head>
    <title>ユーザー一覧</title>
</head>

<body>
    <h2 layout:fragment="page-title">ユーザー一覧</h2>

    <div layout:fragment="content">
        <div th:if="${param.error}" class="alert alert-danger mb-4">
            ユーザー情報の表示または更新に失敗しました。
        </div>
        <div th:if="${successMessage}" class="alert alert-success mb-4" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger mb-4" th:text="${errorMessage}"></div>

        <div class="card mb-6">
            <div class="flex gap-3">
                <a th:href="@{/admin/users/create}" class="btn btn-success text-sm">
                    新規ユーザー追加
                </a>
            </div>
        </div>

        <div class="card mb-6">
            <form class="flex flex-wrap items-end gap-4" method="get" th:action="@{/admin/users}">
                <div class="flex flex-col min-w-[180px]">
                    <label class="form-label">部署 / クラス</label>
                    <select class="form-select h-11" name="department">
                        <option value="All Departments" th:selected="${department == 'All Departments' or department == null}">全部署</option>
                        <option th:each="dept : ${departments}" th:value="${dept}" th:text="${dept}" th:selected="${department == dept}"></option>
                    </select>
                </div>
                <div class="flex flex-col flex-1 min-w-[200px]">
                    <label class="form-label">社員検索</label>
                    <input type="text" class="form-input h-11" name="keyword" placeholder="名前またはID" th:value="${keyword}">
                </div>
                <button type="submit" class="btn btn-primary gap-2 text-sm h-11">
                    <i class="fa-solid fa-filter"></i> 表示
                </button>
            </form>
        </div>

        <div class="card">
            <h4
                class="text-base font-bold text-txt-primary flex items-center pb-4 mb-4 border-b border-glass-border/30">
                ユーザー一覧 <span class="text-sm font-normal text-txt-secondary ml-2"
                    th:text="'(' + ${userCount} + ' 名)'"></span></h4>
            <div class="table-container">
                <table class="table-custom">
                    <thead class="bg-black/10 text-txt-primary">
                        <tr>
                            <th class="text-center">ID</th>
                            <th class="text-center">氏名(メールアドレス)</th>
                            <th class="text-center">ロール</th>
                            <th class="text-center w-px whitespace-nowrap">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-glass-border/10">
                        <tr th:each="user : ${users}" th:with="isAdmin=${user.userRole?.name() == 'ADMIN'}"
                            th:classappend="${user.isActive == false ? 'bg-black/5' : ''}">
                            <td class="text-center" th:classappend="${user.isActive == false ? 'opacity-50 grayscale' : ''}">
                                <div class="text-txt-primary font-mono"
                                    th:text="${#numbers.formatInteger(user.userId, 3)}"></div>
                            </td>
                            <td class="text-center" th:classappend="${user.isActive == false ? 'opacity-50 grayscale' : ''}">
                                <div class="text-txt-primary">
                                    <a th:href="'mailto:' + ${user.email}" class="hover:underline text-primary"
                                        th:text="${user.fullName ?: ''}"></a>
                                </div>
                                <div class="text-xs text-txt-secondary font-mono mt-0.5"
                                    th:text="${user.lastLoginAt != null ? '最終ログイン:' + #temporals.format(user.lastLoginAt.atZone(T(java.time.ZoneId).of('Asia/Tokyo')), 'yyyy/MM/dd-HH:mm') : '最終ログイン:-'}">
                                </div>
                            </td>
                            <td class="text-center" th:classappend="${user.isActive == false ? 'opacity-50 grayscale' : ''}">
                                <span th:if="${user.userRole?.name() == 'ADMIN'}" class="badge badge-danger">管理者</span>
                                <span th:if="${user.userRole?.name() == 'MANAGER'}" class="badge badge-warning">一般管理者</span>
                                <span th:if="${user.userRole?.name() == 'USER'}" class="badge badge-primary">一般</span>
                            </td>
                            <td class="text-center w-px whitespace-nowrap">
                                <a th:href="@{/admin/users/{userId}(userId=${user.userId})}"
                                    class="btn btn-primary px-3 py-1.5 rounded-lg text-xs w-max">設定</a>
                            </td>
                        </tr>
                        <tr th:if="${users.isEmpty()}">
                            <td colspan="4" class="text-center py-12 text-txt-secondary opacity-80">
                                <i class="fa-solid fa-inbox fa-2x mb-2 text-txt-secondary/50"></i>
                                <p class="text-sm font-medium">ユーザーがありません</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
