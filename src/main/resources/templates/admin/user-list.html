<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='users'">
<head>
    <title>ユーザー一覧</title>
</head>
<body>
    <h2 layout:fragment="page-title">ユーザー一覧</h2>

    <div layout:fragment="content">
        <div th:if="${param.error}" class="alert alert-danger mb-4">
            ユーザー情報の表示または更新に失敗しました。
        </div>

        <div class="card mb-6">
            <div class="flex gap-3">
                <a href="/admin/users/create" class="btn btn-success gap-2 text-sm">
                    <i class="fa-solid fa-user-plus"></i> 新規ユーザー追加
                </a>
            </div>
        </div>

        <div class="card">
            <h4 class="text-base font-bold text-txt-primary flex items-center gap-1.5 pb-4 mb-4 border-b border-glass-border/30"><i class="fa-solid fa-users text-primary"></i> ユーザー一覧 <span class="badge badge-warning ml-2 font-mono" th:text="${userCount} + ' 名'"></span></h4>
            <div class="table-container">
                <table class="table-custom">
                    <thead class="bg-black/10 text-txt-primary">
                        <tr>
                            <th><i class="fa-solid fa-hashtag"></i> ID</th>
                            <th><i class="fa-solid fa-envelope"></i> メールアドレス</th>
                            <th><i class="fa-solid fa-user"></i> 氏名</th>
                            <th><i class="fa-solid fa-tag"></i> ロール</th>
                            <th><i class="fa-solid fa-toggle-on"></i> ステータス</th>
                            <th><i class="fa-solid fa-calendar"></i> 最終ログイン</th>
                            <th><i class="fa-solid fa-tools"></i> 操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-glass-border/10">
                        <tr th:each="user : ${users}" th:with="isAdmin=${user.userRole?.name() == 'ADMIN'}">
                            <td class="font-mono" th:text="${user.userId}"></td>
                            <td class="font-mono" th:text="${user.email}"></td>
                            <td class="font-semibold" th:text="${user.fullName ?: ''}"></td>
                            <td>
                                <span th:if="${isAdmin}" class="badge badge-danger">
                                    <i class="fa-solid fa-shield-alt"></i> 管理者
                                </span>
                                <span th:unless="${isAdmin}" class="badge badge-primary">
                                    <i class="fa-solid fa-user"></i> 一般ユーザー
                                </span>
                            </td>
                            <td>
                                <span th:if="${user.isActive}" class="badge badge-success">
                                    <i class="fa-solid fa-check-circle"></i> 有効
                                </span>
                                <span th:unless="${user.isActive}" class="badge badge-danger">
                                    <i class="fa-solid fa-times-circle"></i> 無効
                                </span>
                            </td>
                            <td class="font-mono" th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt.atZone(T(java.time.ZoneId).of('Asia/Tokyo')), 'yyyy-MM-dd HH:mm:ss') : '-'}"></td>
                            <td>
                                <a th:href="@{/admin/users/{userId}(userId=${user.userId})}" class="btn btn-primary gap-1.5 px-3 py-1.5 rounded-lg text-xs">
                                    <i class="fa-solid fa-cog"></i> 詳細・設定
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${users.isEmpty()}">
                            <td colspan="7" class="text-center py-12 text-txt-secondary opacity-80">
                                <i class="fa-solid fa-inbox fa-2x mb-2 text-txt-secondary/50"></i>
                                <p class="text-sm font-medium">ユーザーがありません</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
