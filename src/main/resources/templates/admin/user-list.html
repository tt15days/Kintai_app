<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='users'">
<head>
    <title>ユーザー一覧</title>
</head>
<body>
    <h2 layout:fragment="page-title">ユーザー一覧</h2>

    <div layout:fragment="content">
        <div th:if="${param.error}" class="alert alert-danger mb-4">
            ユーザー情報の表示または更新に失敗しました。
        </div>

        <div class="card mb-6">
            <div class="flex gap-3">
                <a href="/admin/users/create" class="btn btn-success gap-2 text-sm">
                    <i class="fa-solid fa-user-plus"></i> 新規ユーザー追加
                </a>
            </div>
        </div>

        <div class="card">
            <h4 class="text-base font-bold text-txt-primary flex items-center gap-1.5 pb-4 mb-4 border-b border-glass-border/30"><i class="fa-solid fa-users text-primary"></i> ユーザー一覧 <span class="badge badge-warning ml-2 font-mono" th:text="${userCount} + ' 名'"></span></h4>
            <div class="table-container">
                <table class="table-custom">
                    <thead class="bg-black/10 text-txt-primary">
                        <tr>
                            <th>氏名 / ID</th>
                            <th>メールアドレス / 最終ログイン</th>
                            <th>ロール</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-glass-border/10">
                        <tr th:each="user : ${users}" th:with="isAdmin=${user.userRole?.name() == 'ADMIN'}" th:classappend="${!user.isActive} ? 'opacity-45 bg-black/5 grayscale' : ''">
                            <td>
                                <div class="font-semibold text-txt-primary" th:text="${user.fullName ?: ''}"></div>
                                <div class="text-xs text-txt-secondary font-mono opacity-80 mt-0.5" th:text="'ID: ' + ${user.userId}"></div>
                            </td>
                            <td>
                                <div class="font-mono text-sm text-txt-primary" th:text="${user.email}"></div>
                                <div class="text-xs text-txt-secondary font-mono mt-0.5" th:text="${user.lastLoginAt != null ? '最終ログイン: ' + #temporals.format(user.lastLoginAt.atZone(T(java.time.ZoneId).of('Asia/Tokyo')), 'yyyy-MM-dd HH:mm') : '最終ログイン: -'}"></div>
                            </td>
                            <td>
                                <span th:if="${isAdmin}" class="badge badge-danger">管理者</span>
                                <span th:unless="${isAdmin}" class="badge badge-primary">一般</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/users/{userId}(userId=${user.userId})}" class="btn btn-primary gap-1.5 px-3 py-1.5 rounded-lg text-xs">
                                    <i class="fa-solid fa-cog"></i> 詳細・設定
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${users.isEmpty()}">
                            <td colspan="4" class="text-center py-12 text-txt-secondary opacity-80">
                                <i class="fa-solid fa-inbox fa-2x mb-2 text-txt-secondary/50"></i>
                                <p class="text-sm font-medium">ユーザーがありません</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
