<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="hideSidebar=true">
<head>
    <title>アクセス拒否</title>
</head>
<body>
    <div layout:fragment="content" class="flex min-h-[80vh] items-center justify-center">
        <div class="card-message animate-fade-in">
            <h1 class="text-xl font-bold text-txt-primary mb-2">アクセスが拒否されました</h1>

            <p class="text-center text-txt-secondary text-sm leading-relaxed mb-6">
                この画面を表示する十分な権限がありません。<br>必要な権限が付与されているかご確認ください。
            </p>

            <div class="flex flex-col gap-3 w-full">
                <a th:href="@{/dashboard}" class="w-full bg-primary text-white hover:bg-primary/90 inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold text-sm transition-all duration-200 active:scale-95 cursor-pointer no-underline">
                    ダッシュボードへ戻る
                </a>
                <a th:href="@{/login}" class="w-full bg-black/5 hover:bg-black/10 text-txt-primary border border-glass-border inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold text-sm transition-all duration-200 active:scale-95 cursor-pointer no-underline">
                    ログイン画面へ
                </a>
            </div>
        </div>
    </div>
</body>
</html>
