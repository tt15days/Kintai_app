<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='input'">
<head>
    <title>打刻・出退勤</title>
</head>
<body>
    <h2 layout:fragment="page-title">打刻・出退勤</h2>

    <div layout:fragment="content" class="max-w-[600px] mx-auto">
        <div th:if="${message}" class="alert alert-success text-center justify-center" role="alert" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger text-center justify-center" role="alert" th:text="${error}"></div>
        
        <div class="card p-8 text-center">
            <h3 class="text-center text-txt-secondary font-semibold m-0 text-lg" id="current-date" th:text="${#temporals.format(#temporals.createNow(), 'EEEE, MMMM dd')}">Friday, October 12</h3>
            <div class="text-center my-8 text-6xl font-bold tracking-wider bg-gradient-to-r from-txt-primary to-txt-secondary bg-clip-text text-transparent font-mono" id="current-time">00:00:00</div>
            
            <div class="flex items-center justify-center gap-4 mb-6">
                <span class="text-sm font-semibold text-txt-secondary">通常出勤</span>
                <label class="choice-label relative select-none">
                    <input type="checkbox" id="holiday-work-toggle" class="sr-only peer" aria-label="休日出勤フラグ">
                    <div class="w-14 h-8 bg-slate-200/50 rounded-full peer peer-focus:ring-2 peer-focus:ring-primary/50 peer-checked:after:translate-x-6 peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary"></div>
                </label>
                <span class="text-sm font-semibold text-txt-secondary">休日出勤</span>
            </div>

            <div class="mb-4 text-sm font-semibold" aria-live="polite">
                <span th:if="${todayRecord == null or todayRecord.startTime == null}" class="px-2.5 py-1 rounded-full bg-black/5 text-txt-secondary border border-glass-border">未出勤</span>
                <span th:if="${todayRecord != null and todayRecord.startTime != null and todayRecord.endTime == null}" class="px-2.5 py-1 rounded-full bg-success/15 text-success border border-success/20">出勤中</span>
                <span th:if="${todayRecord != null and todayRecord.startTime != null and todayRecord.endTime != null}" class="px-2.5 py-1 rounded-full bg-black/5 text-txt-secondary border border-glass-border">退勤済み</span>
            </div>

            <div class="mb-4 flex items-center justify-center gap-2" th:if="${todayRecord == null or todayRecord.startTime == null}">
                <label for="quick-class-select" class="text-sm font-semibold text-txt-secondary">本日の勤務地</label>
                <select id="quick-class-select" name="classId" form="clock-in-form"
                        class="form-select max-w-60 p-1.5 text-base md:text-sm">
                    <option value="">所属クラス</option>
                    <option th:each="wsc : ${workScheduleClasses}" th:value="${wsc.classId}" th:text="${wsc.name}"></option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <form th:action="@{/attendance/quick-start}" method="post" class="w-full" id="clock-in-form">
                    <button type="submit" class="btn btn-primary p-6 text-xl rounded-2xl w-full gap-2 cursor-pointer" th:disabled="${todayRecord != null and todayRecord.startTime != null}">
                        <i class="fa-solid fa-right-to-bracket"></i> 出勤打刻
                    </button>
                </form>
                <form th:action="@{/attendance/quick-end}" method="post" class="w-full" id="clock-out-form">
                    <input type="hidden" name="isHolidayWork" id="hidden-holiday-work" value="false">
                    <button type="submit" class="btn btn-danger p-6 text-xl rounded-2xl w-full gap-2 cursor-pointer" th:disabled="${todayRecord == null or todayRecord.startTime == null or todayRecord.endTime != null}">
                        <i class="fa-solid fa-right-from-bracket"></i> 退勤打刻
                    </button>
                </form>
            </div>

            <div class="flex gap-4 justify-center">
                <button type="button" class="btn btn-flat px-5 py-3 text-sm gap-2 cursor-pointer" onclick="openModal('breakModal')">
                    <i class="fa-solid fa-mug-hot"></i> 休憩時間の記録
                </button>
                <a th:href="@{/leave/create}" class="btn btn-success px-5 py-3 text-sm gap-2">
                    <i class="fa-solid fa-plane"></i> 有給休暇申請
                </a>
            </div>

            <form th:action="@{/attendance/quick-break}" method="post" id="break-form" class="hidden">
                <input type="hidden" name="breakTimeMinutes" id="break-time-minutes">
            </form>
        </div>
    </div>

    <th:block layout:fragment="modals">
        <div id="breakModal" class="modal fixed inset-0 z-[2000] overflow-y-auto bg-black/60 backdrop-blur-sm hidden transition-all duration-300" onclick="closeModal('breakModal')"
             role="dialog" aria-modal="true" aria-labelledby="breakModalTitle" aria-hidden="true" tabindex="-1">
            <div class="flex min-h-full items-center justify-center p-4">
                <div class="card-heavy w-full max-w-[400px]" onclick="event.stopPropagation()">
                    <div class="flex items-center justify-between pb-4 border-b border-glass-border/30 mb-4">
                        <h5 id="breakModalTitle" class="m-0 text-base font-bold text-txt-primary">休憩時間の記録</h5>
                        <button type="button" class="icon-button text-txt-primary hover:opacity-75 transition-opacity text-xl font-semibold" onclick="closeModal('breakModal')" aria-label="閉じる">×</button>
                    </div>
                    <div class="relative flex-auto py-2">
                        <label for="break-minutes-input" class="form-label">休憩時間（分）</label>
                        <input type="number" id="break-minutes-input" class="form-input" min="1" step="1" value="60">
                    </div>
                    <div class="flex gap-4 mt-4">
                        <button type="button" class="btn btn-flat flex-1" onclick="closeModal('breakModal')">キャンセル</button>
                        <button type="button" class="btn btn-primary flex-[2]" onclick="submitBreak()">記録する</button>
                    </div>
                </div>
            </div>
        </div>
    </th:block>

    <th:block layout:fragment="js">
        <script>
            function updateTime() {
                const now = new Date();
                document.getElementById('current-time').textContent = now.toLocaleTimeString('ja-JP', { hour12: false });
                document.getElementById('current-date').textContent = now.toLocaleDateString('ja-JP', { weekday: 'long', month: 'long', day: 'numeric' });
            }
            setInterval(updateTime, 1000);
            updateTime();

            const toggle = document.getElementById('holiday-work-toggle');
            const hiddenInput = document.getElementById('hidden-holiday-work');
            if (toggle && hiddenInput) {
                toggle.addEventListener('change', function() {
                    hiddenInput.value = this.checked;
                });
            }

            function submitBreak() {
                const minutes = document.getElementById('break-minutes-input').value;
                if (minutes !== null && minutes.trim() !== "" && !isNaN(minutes) && parseInt(minutes, 10) > 0) {
                    document.getElementById('break-time-minutes').value = parseInt(minutes, 10);
                    closeModal('breakModal');
                    document.getElementById('break-form').submit();
                }
            }
        </script>
    </th:block>
</body>
</html>
