<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="hideSidebar=true">
<head>
    <title>ログアウト完了 - Nexus Time</title>
</head>
<body>
    <div layout:fragment="content" class="flex min-h-[80vh] items-center justify-center">
        <div class="card w-full max-w-md p-8 text-center animate-fade-in">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 text-primary text-3xl mb-4">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </div>
            <h1 class="text-xl font-bold text-txt-primary mb-2">ログアウト完了</h1>

            <p class="text-center text-txt-secondary text-sm leading-relaxed mb-6">
                安全にログアウトされました。<br>ご利用ありがとうございました。
            </p>

            <!-- ログアウト情報 -->
            <div class="bg-glass-input/60 border border-glass-border rounded-xl p-4 mb-6 text-left text-sm text-txt-secondary space-y-1.5">
                <p class="font-bold text-txt-primary"><i class="fa-solid fa-circle-info text-primary"></i> ログアウト情報</p>
                <p><i class="fa-solid fa-clock mr-1 text-txt-secondary/60"></i> <span id="logoutTime"></span></p>
                <p><i class="fa-solid fa-shield-halved mr-1 text-txt-secondary/60"></i> セッションは安全に終了されました</p>
            </div>

            <a href="/login" class="btn btn-primary w-full py-3 text-sm font-bold no-underline mb-4 gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> 再度ログインする
            </a>

            <div class="text-xs text-txt-secondary/60 mt-4" id="countdown">
                5秒後に自動的にログインページへ移動します...
            </div>
        </div>
    </div>

    <th:block layout:fragment="js">
        <script>
            function setLogoutTime() {
                const now = new Date();
                const timeString = now.toLocaleString('ja-JP', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
                document.getElementById('logoutTime').textContent = timeString;
            }

            function startCountdown() {
                let remaining = 5;
                const countdownEl = document.getElementById('countdown');
                const interval = setInterval(() => {
                    remaining--;
                    if (remaining > 0) {
                        countdownEl.textContent = remaining + '秒後に自動的にログインページへ移動します...';
                    } else {
                        clearInterval(interval);
                        window.location.href = '/login';
                    }
                }, 1000);
            }

            document.addEventListener('DOMContentLoaded', function() {
                setLogoutTime();
                startCountdown();
            });
        </script>
    </th:block>
</body>
</html>
