<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}" th:with="hideSidebar=true">

<head>
    <title>ログアウト完了</title>
</head>

<body>
    <div layout:fragment="content" class="flex min-h-[80vh] items-center justify-center">
        <div class="card w-full max-w-md p-8 text-center animate-fade-in">
            <h1 class="text-xl font-bold text-txt-primary mb-2">ログアウト完了</h1>

            <p class="text-center text-txt-secondary text-sm leading-relaxed mb-6">
                安全にログアウトされました。<br>ご利用ありがとうございました。
            </p>

            <!-- ログアウト情報 -->
            <div
                class="bg-glass-input/60 border border-glass-border rounded-xl p-4 mb-6 text-left text-sm text-txt-secondary space-y-1.5">
                <p class="font-bold text-txt-primary">ログアウト情報</p>
                <p><span id="logoutTime"></span></p>
                <p>セッションは安全に終了されました</p>
            </div>

            <a th:href="@{/login}" class="btn btn-primary w-full py-3 text-sm font-bold no-underline mb-4 gap-2">
                再度ログインする
            </a>

        </div>
    </div>

    <th:block layout:fragment="js">
        <script th:inline="javascript">
            function setLogoutTime() {
                const now = new Date();
                const timeString = now.toLocaleString('ja-JP', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
                document.getElementById('logoutTime').textContent = timeString;
            }

            document.addEventListener('DOMContentLoaded', function () {
                setLogoutTime();
            });
        </script>
    </th:block>
</body>

</html>
