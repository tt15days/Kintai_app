<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="activePage='today-status'">
<head>
    <title>当日状況一覧</title>
</head>
<body>
    <h2 layout:fragment="page-title" class="text-2xl font-bold text-txt-primary flex items-center gap-2">
        <i class="fas fa-users-viewfinder text-primary"></i> 当日状況一覧
    </h2>

    <div layout:fragment="content">
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span><i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span></span>
        </div>

        <div class="card">
            <div class="pb-4 mb-4 border-b border-glass-border/30 flex flex-wrap items-center justify-between gap-3">
                <h5 class="text-base font-bold text-txt-primary flex items-center gap-1.5">
                    <i class="fas fa-calendar-day text-primary"></i>
                    <span th:text="${#temporals.format(today, 'yyyy/MM/dd(E)')}"></span> の勤務状況
                    <span class="badge bg-black/5 text-txt-secondary border-glass-border ml-2" th:text="${#lists.size(rows)}">0</span>名
                </h5>
                <!-- 絞り込み -->
                <form method="get" th:action="@{/attendance/approval/today-status}" class="flex flex-wrap items-center gap-2">
                    <label for="todayDepartment" class="sr-only">部署 / クラス</label>
                    <select id="todayDepartment" class="form-select h-10 text-base md:text-sm" name="department">
                        <option value="">全部署</option>
                        <option th:each="dept : ${departments}" th:value="${dept.name}" th:text="${dept.name}"
                                th:selected="${department == dept.name}"></option>
                    </select>
                    <label for="todayClassName" class="sr-only">勤務地</label>
                    <select id="todayClassName" class="form-select h-10 text-base md:text-sm" name="className">
                        <option value="">全勤務地</option>
                        <option th:each="wsc : ${workScheduleClasses}" th:value="${wsc.name}" th:text="${wsc.name}"
                                th:selected="${className == wsc.name}"></option>
                    </select>
                    <button type="submit" class="btn btn-primary px-4 py-2 text-sm gap-1.5">
                        <i class="fas fa-filter"></i> 絞り込み
                    </button>
                </form>
            </div>
            <div>
                <div th:if="${#lists.isEmpty(rows)}" class="py-6 text-txt-secondary opacity-80 text-center">
                    表示対象のメンバーがいません。
                </div>
                <div th:unless="${#lists.isEmpty(rows)}" class="divide-y divide-glass-border/10">
                    <div th:each="row : ${rows}" class="py-3">
                        <div class="flex items-center gap-2 min-w-0">
                            <span class="font-mono text-sm text-txt-secondary shrink-0"
                                  th:text="${(empNoPrefix != null ? empNoPrefix : '') + #numbers.formatInteger(row.user.userId, 3)}">EMP-001</span>
                            <span class="font-semibold truncate" th:text="${row.user.fullName}">氏名</span>
                            <span th:if="${row.status == '勤務中'}" class="badge badge-success shrink-0">勤務中</span>
                            <span th:if="${row.status == '退勤済'}" class="badge bg-black/5 text-txt-secondary border-glass-border shrink-0">退勤済</span>
                            <span th:if="${row.status == '休暇'}" class="badge bg-success/15 text-success border-success/20 shrink-0">休暇</span>
                            <span th:if="${row.status == '未出勤'}" class="badge badge-warning shrink-0">未出勤</span>
                        </div>
                        <div class="mt-1 grid grid-cols-[minmax(0,1fr)_auto] items-center gap-3 text-sm text-txt-secondary">
                            <span class="truncate"
                                  th:text="${(row.user.department != null ? row.user.department : '-') + ' / ' + (row.user.className != null ? row.user.className : '-') + (row.eventName != null ? ' / ' + row.eventName : '')}">部署 / 勤務クラス / 事由</span>
                            <span class="font-mono whitespace-nowrap"
                                  th:text="${'出 ' + (row.startTime != null ? row.startTime : '--:--') + '　退 ' + (row.endTime != null ? row.endTime : '--:--')}">出 09:00　退 18:00</span>
                        </div>
                    </div>
                </div>
                <p class="text-xs text-txt-secondary mt-3">
                    ※ 状態は当日の打刻と承認済み休暇から判定しています。最新の状況はページを再読み込みして確認してください。
                </p>
            </div>
        </div>
    </div>
</body>
</html>
