<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      th:with="activePage='approval'">
<head>
    <title>勤怠承認一覧</title>
</head>
<body>

<h2 layout:fragment="page-title">
    月次勤怠 承認待ち
    <span class="px-2.5 py-1 text-xs font-bold rounded-full bg-warning/15 text-warning border border-warning/20 ml-2"
          th:if="${pendingSubmissions != null and !pendingSubmissions.isEmpty()}"
          th:text="${#lists.size(pendingSubmissions)} + '件'"></span>
</h2>

<div layout:fragment="content" class="flex flex-col flex-grow">
    <div class="flex justify-end mb-4">
        <a th:href="@{/attendance/approval/corrections}" class="bg-black/5 hover:bg-black/10 border border-glass-border text-txt-primary inline-flex items-center gap-2 px-4 py-2 rounded-xl font-semibold text-sm transition-all duration-200 active:scale-95 cursor-pointer">
            修正申請の承認へ
        </a>
    </div>

    <!-- フラッシュメッセージ -->
    <div class="mb-4" th:if="${message != null}">
        <div class="bg-success/15 border border-success/30 text-success p-4 rounded-xl flex justify-between items-center mb-6 text-sm font-semibold transition-all duration-200" role="alert">
            <span><span th:text="${message}"></span></span>
            <button type="button" class="icon-button shrink-0 text-txt-primary hover:opacity-100 opacity-70 transition-opacity bg-transparent border-0 text-xl leading-none cursor-pointer" onclick="this.closest('[role=alert]').remove()" aria-label="閉じる">×</button>
        </div>
    </div>
    <div class="mb-4" th:if="${error != null}">
        <div class="bg-danger/12 border border-danger/30 text-danger p-4 rounded-xl flex justify-between items-center mb-6 text-sm font-semibold transition-all duration-200" role="alert">
            <span><span th:text="${error}"></span></span>
            <button type="button" class="icon-button shrink-0 text-txt-primary hover:opacity-100 opacity-70 transition-opacity bg-transparent border-0 text-xl leading-none cursor-pointer" onclick="this.closest('[role=alert]').remove()" aria-label="閉じる">×</button>
        </div>
    </div>

    <div class="bg-glass/70 backdrop-blur-glass border border-glass-border shadow-glass rounded-[24px] p-6 transition-all duration-300 flex-grow flex flex-col">
        <div class="flex-grow flex flex-col">

            <!-- 承認待ちなし -->
            <div class="text-center py-12 text-txt-secondary opacity-80 flex flex-col items-center justify-center" th:if="${pendingSubmissions == null or pendingSubmissions.isEmpty()}">
                <p class="mb-0 text-sm font-medium">承認待ちの月次勤怠申請はありません</p>
            </div>

            <!-- 承認待ち一覧 -->
            <div th:each="submission : ${pendingSubmissions}" class="bg-glass/70 backdrop-blur-glass border border-glass-border shadow-glass rounded-[16px] p-5 flex flex-col mb-4 transition-all duration-300 border-l-[4px] border-l-warning hover:border-l-primary">
                <div>
                    <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                        <!-- 申請者情報と申請情報 -->
                        <div class="flex-1 min-w-[200px]">
                            <!-- 承認待ちバッジとユーザー名/年月を並べる -->
                            <div class="flex items-center gap-2 flex-wrap mb-1">
                                <span class="px-2.5 py-1 text-xs font-bold rounded-full bg-warning/15 text-warning border border-warning/20 shrink-0"
                                      th:if="${submission.status == submissionStatusPending}">
                                    承認待ち
                                </span>
                                <span class="px-2 py-0.5 text-[0.7rem] font-bold rounded-full bg-success/15 text-success border border-success/20 shrink-0"
                                      th:if="${submission.status == submissionStatusApproved}">
                                    承認済み
                                </span>
                                <span class="px-2 py-0.5 text-[0.7rem] font-bold rounded-full bg-danger/15 text-danger border border-danger/20 shrink-0"
                                      th:if="${submission.status == submissionStatusReturned}">
                                    差し戻し済み
                                </span>
                                <div class="font-semibold text-[15px] text-txt-primary flex items-center">
                                    <a th:href="@{/attendance/approval/{userId}/detail(userId=${submission.userId}, yearMonth=${submission.targetYearMonth})}"
                                       class="text-primary hover:underline font-semibold flex items-center">
                                        <span th:text="${applicantUsers[submission.userId] != null ? applicantUsers[submission.userId].fullName : '不明ユーザー'}"></span>
                                        <span class="mx-1 font-normal">/</span>
                                        <span class="font-normal" th:text="${submission.targetYearMonth}"></span>
                                    </a>
                                </div>
                            </div>
                            <!-- 申請日時（行間を詰めて配置） -->
                            <div class="text-xs text-txt-secondary opacity-80 flex items-center">
                                申請日時:
                                <span class="ml-1" th:text="${submission.submittedAt != null ? #temporals.format(submission.submittedAt.atZone(T(java.time.ZoneId).of('Asia/Tokyo')), 'yyyy/MM/dd HH:mm') : '-'}"></span>
                            </div>
                            <!-- アクションコメント -->
                            <div class="text-xs text-txt-secondary opacity-80 flex items-center mt-1"
                                 th:if="${submission.actionComment != null and !submission.actionComment.isBlank()}">
                                <span th:text="${submission.actionComment}"></span>
                            </div>
                        </div>

                        <!-- 操作ボタン -->
                        <div class="flex gap-2 flex-wrap justify-end items-center"
                             th:if="${submission.status == submissionStatusPending}">
                            <button type="button" class="bg-success-action text-white hover:bg-success-action-hover inline-flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-lg font-semibold transition-all duration-200 active:scale-95 text-xs cursor-pointer"
                                    th:data-submission-id="${submission.submissionId}"
                                    th:data-applicant-name="${applicantUsers[submission.userId] != null ? applicantUsers[submission.userId].fullName : '不明'}"
                                    th:data-year-month="${submission.targetYearMonth}"
                                    onclick="openApproveModal(this)">
                                承認
                            </button>
                            <button type="button" class="bg-danger-action text-white hover:bg-danger-action-hover inline-flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-lg font-semibold transition-all duration-200 active:scale-95 text-xs cursor-pointer"
                                    th:data-submission-id="${submission.submissionId}"
                                    th:data-applicant-name="${applicantUsers[submission.userId] != null ? applicantUsers[submission.userId].fullName : '不明'}"
                                    th:data-year-month="${submission.targetYearMonth}"
                                    onclick="openReturnModal(this)">
                                差し戻し
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
</div>

<th:block layout:fragment="modals">
    <!-- 承認確認モーダル -->
    <div class="modal hidden" id="approveModal" onclick="closeApproveModal()"
         role="dialog" aria-modal="true" aria-labelledby="approveModalLabel" aria-hidden="true" tabindex="-1">
        <div class="flex min-h-full items-center justify-center p-4">
            <div id="approveModalContent" class="card-heavy w-full max-w-[500px]" onclick="event.stopPropagation()">
                <div class="flex items-center justify-between pb-4 border-b border-glass-border/30 mb-4">
                    <h5 class="m-0 text-base font-bold text-txt-primary" id="approveModalLabel">
                        承認確認
                    </h5>
                    <button type="button" class="icon-button text-txt-primary hover:opacity-75 transition-opacity text-xl font-semibold" onclick="closeApproveModal()" aria-label="閉じる">
                        ×
                    </button>
                </div>
                <div class="relative flex-auto py-2">
                    <p class="mb-4 text-sm text-txt-primary">
                        <strong id="approveApplicantName"></strong> さんの
                        <strong id="approveYearMonth"></strong> 分の月次勤累計を承認しますか？
                    </p>
                    <form id="approveForm" method="post" class="space-y-4">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="flex flex-col gap-1.5">
                            <label for="approveComment" class="form-label">承認コメント（任意）</label>
                            <textarea class="form-textarea" id="approveComment" name="comment" rows="2"
                                      placeholder="承認コメントを入力してください"></textarea>
                        </div>
                    </form>
                </div>
                <div class="flex gap-4 mt-4">
                    <button type="button" class="btn btn-flat flex-1" onclick="closeApproveModal()">
                        キャンセル
                    </button>
                    <button type="button" class="btn btn-success flex-[2]" onclick="submitApproveForm()">
                        承認する
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 差し戻し確認モーダル -->
    <div class="modal hidden" id="returnModal" onclick="closeReturnModal()"
         role="dialog" aria-modal="true" aria-labelledby="returnModalLabel" aria-hidden="true" tabindex="-1">
        <div class="flex min-h-full items-center justify-center p-4">
            <div id="returnModalContent" class="card-heavy w-full max-w-[500px]" onclick="event.stopPropagation()">
                <div class="flex items-center justify-between pb-4 border-b border-glass-border/30 mb-4">
                    <h5 class="m-0 text-base font-bold text-txt-primary" id="returnModalLabel">
                        差し戻し確認
                    </h5>
                    <button type="button" class="icon-button text-txt-primary hover:opacity-75 transition-opacity text-xl font-semibold" onclick="closeReturnModal()" aria-label="閉じる">
                        ×
                    </button>
                </div>
                <div class="relative flex-auto py-2">
                    <p class="mb-4 text-sm text-txt-primary">
                        <strong id="returnApplicantName"></strong> さんの
                        <strong id="returnYearMonth"></strong> 分の月次勤累計を差し戻しますか？
                    </p>
                    <form id="returnForm" method="post" class="space-y-4">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="flex flex-col gap-1.5">
                            <label for="returnComment" class="form-label">差し戻し理由</label>
                            <textarea class="form-textarea" id="returnComment" name="comment" rows="2"
                                      placeholder="差し戻しの理由を入力してください（申請者に通知されます）"></textarea>
                        </div>
                    </form>
                </div>
                <div class="flex gap-4 mt-4">
                    <button type="button" class="btn btn-flat flex-1" onclick="closeReturnModal()">
                        キャンセル
                    </button>
                    <button type="button" class="btn btn-danger flex-[2]" onclick="submitReturnForm()">
                        差し戻す
                    </button>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="js">
    <script>
        let contextPath = document.querySelector('meta[name="context-path"]')?.getAttribute('content') || '';
        if (contextPath === '/') contextPath = '';
        else if (contextPath.endsWith('/')) contextPath = contextPath.slice(0, -1);

        function openApproveModal(btn) {
            var submissionId = btn.getAttribute('data-submission-id');
            var applicantName = btn.getAttribute('data-applicant-name');
            var yearMonth = btn.getAttribute('data-year-month');
            document.getElementById('approveApplicantName').textContent = applicantName;
            document.getElementById('approveYearMonth').textContent = yearMonth;
            document.getElementById('approveForm').action = contextPath + '/attendance/approval/' + submissionId + '/approve';
            document.getElementById('approveComment').value = '';

            openModal('approveModal');
        }

        function closeApproveModal() {
            closeModal('approveModal');
        }

        function openReturnModal(btn) {
            var submissionId = btn.getAttribute('data-submission-id');
            var applicantName = btn.getAttribute('data-applicant-name');
            var yearMonth = btn.getAttribute('data-year-month');
            document.getElementById('returnApplicantName').textContent = applicantName;
            document.getElementById('returnYearMonth').textContent = yearMonth;
            document.getElementById('returnForm').action = contextPath + '/attendance/approval/' + submissionId + '/return';
            document.getElementById('returnComment').value = '';

            openModal('returnModal');
        }

        function closeReturnModal() {
            closeModal('returnModal');
        }

        function submitApproveForm() {
            document.getElementById('approveForm').submit();
        }

        function submitReturnForm() {
            document.getElementById('returnForm').submit();
        }
    </script>
</th:block>
</body>
</html>
