<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='leaves'">
<head>
    <title>休暇申請一覧</title>
</head>
<body>
    <h2 layout:fragment="page-title">休暇申請一覧</h2>
    <div layout:fragment="content">

        <!-- Flash messages -->
        <div class="mb-4" th:if="${message != null}">
            <div class="alert alert-success text-center justify-center" role="alert" th:text="${message}"></div>
        </div>
        <div class="mb-4" th:if="${error != null}">
            <div class="alert alert-danger text-center justify-center" role="alert" th:text="${error}"></div>
        </div>

        <div class="card">
            <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                <h3 class="m-0 text-[1.15rem] font-bold text-txt-primary">休暇申請一覧</h3>
                <a th:href="@{/leave/create}" class="btn btn-primary px-5 py-2.5 text-sm cursor-pointer gap-2">
                    新規休暇申請
                </a>
            </div>

            <!-- ステータスフィルタ -->
            <form method="get" th:action="@{/leave}" class="flex items-center flex-wrap gap-2 mb-4">
                <label for="status" class="text-xs text-txt-secondary font-medium whitespace-nowrap">ステータスで絞り込み</label>
                <select id="status" name="status" class="form-select w-auto p-2 text-base md:text-sm" onchange="this.form.submit()">
                    <option value="" th:selected="${param.status == null}">すべて</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.displayName}"
                            th:selected="${param.status != null and param.status[0] == s.name()}"></option>
                </select>
                <noscript>
                    <button type="submit" class="btn btn-flat py-1.5 px-3 text-sm cursor-pointer">表示</button>
                </noscript>
            </form>

            <!-- 申請履歴テーブル -->
            <div class="table-container" th:if="${applications != null and !applications.isEmpty()}">
                <table class="table-custom mb-0 text-sm w-full">
                    <thead>
                        <tr>
                            <th class="text-center">期間</th>
                            <th class="text-center">期間種別</th>
                            <th class="text-center">休暇タイプ</th>
                            <th class="text-center">理由</th>
                            <th class="text-center">状況</th>
                            <th class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="app : ${applications}">
                            <td class="text-center whitespace-nowrap font-mono text-xs md:text-sm">
                                <span th:text="${#temporals.format(app.leaveStartDate, 'yyyy/MM/dd')}"></span>
                                <span> 〜 </span>
                                <span th:text="${#temporals.format(app.leaveEndDate, 'yyyy/MM/dd')}"></span>
                            </td>
                            <td class="text-center whitespace-nowrap">
                                <span class="badge badge-primary" th:if="${app.leaveDurationType == 'AM_HALF'}">午前半休</span>
                                <span class="badge badge-primary" th:if="${app.leaveDurationType == 'PM_HALF'}">午後半休</span>
                                <span class="badge badge-primary"
                                      th:if="${app.leaveDurationType == null or app.leaveDurationType == 'FULL_DAY'}">終日</span>
                            </td>
                            <td class="text-center whitespace-nowrap" th:text="${app.leaveType.displayName}"></td>
                            <td class="text-sm break-words max-w-[240px]" th:text="${app.reason}"></td>
                            <td class="text-center whitespace-nowrap">
                                <span class="badge badge-success" th:if="${app.status.name() == 'APPROVED'}">承認済み</span>
                                <span class="badge badge-warning" th:if="${app.status.name() == 'PENDING'}">申請中</span>
                                <span class="badge badge-danger" th:if="${app.status.name() == 'REJECTED'}">却下</span>
                            </td>
                            <td class="text-center whitespace-nowrap">
                                <form method="post" th:action="@{/leave/delete/{id}(id=${app.applicationId})}" class="mb-0 inline-block">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-danger px-3 py-1.5 text-xs cursor-pointer"
                                            th:if="${lockedApplicationIds == null or !lockedApplicationIds.contains(app.applicationId)}"
                                            onclick="return confirm('この休暇申請を取り消します。よろしいですか？');">
                                        取消
                                    </button>
                                    <button type="button" class="btn btn-danger px-3 py-1.5 text-xs opacity-50 cursor-not-allowed"
                                            th:if="${lockedApplicationIds != null and lockedApplicationIds.contains(app.applicationId)}"
                                            disabled title="対象月は締め処理済みのため取消できません">
                                        取消
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 空の場合 -->
            <p class="text-txt-secondary text-sm text-center py-8"
               th:if="${applications == null or applications.isEmpty()}">
                休暇申請はありません
            </p>
        </div>
    </div>
</body>
</html>
