<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='attendance'">
<head>
    <title>修正申請一覧</title>
</head>
<body>
    <h2 layout:fragment="page-title">修正申請一覧</h2>

    <div layout:fragment="content">



<div class="container mx-auto px-4 py-6">
    <div class="max-w-6xl mx-auto">
        <div class="card">
            <div class="flex items-center justify-between pb-4 mb-6 border-b border-glass-border/30">
                <h4 class="text-lg font-bold text-txt-primary flex items-center gap-2">
                    <i class="fas fa-history text-primary"></i> 勤怠修正申請一覧
                </h4>
            </div>
            <div>

                <div class="mb-4" th:if="${message != null}">
                    <div class="alert alert-success gap-2" role="alert">
                        <i class="fas fa-check-circle text-lg"></i>
                        <span th:text="${message}"></span>
                    </div>
                </div>
                <div class="mb-4" th:if="${warning != null}">
                    <div class="alert alert-warning gap-2" role="alert">
                        <i class="fas fa-exclamation-triangle text-lg"></i>
                        <span th:text="${warning}"></span>
                    </div>
                </div>
                <div class="mb-4" th:if="${error != null}">
                    <div class="alert alert-danger gap-2" role="alert">
                        <i class="fas fa-exclamation-circle text-lg"></i>
                        <span th:text="${error}"></span>
                    </div>
                </div>

                <div class="table-container">
                    <table class="table-custom">
                        <thead class="bg-black/10 text-txt-primary">
                        <tr>
                            <th>申請日</th>
                            <th>対象年月</th>
                            <th>申請内容</th>
                            <th>修正理由</th>
                            <th>ステータス</th>
                            <th>承認者コメント</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="req : ${requests}">
                            <td class="font-mono" th:text="${req.attendanceDate != null ? #temporals.format(req.attendanceDate, 'yyyy-MM-dd') : '-'}"></td>
                            <td class="font-mono" th:text="${req.targetYearMonth}"></td>
                            <td>
                                <div class="flex flex-col gap-0.5">
                                    <div>
                                        <span class="text-xs text-txt-secondary opacity-70">開始：</span>
                                        <span class="font-mono" th:text="${req.requestedStartTime != null ? #temporals.format(req.requestedStartTime, 'HH:mm') : '（なし）'}"></span>
                                    </div>
                                    <div>
                                        <span class="text-xs text-txt-secondary opacity-70">終了：</span>
                                        <span class="font-mono" th:text="${req.requestedEndTime != null ? #temporals.format(req.requestedEndTime, 'HH:mm') : '（なし）'}"></span>
                                    </div>
                                    <div th:if="${req.requestedRemarks != null and !req.requestedRemarks.isEmpty()}">
                                        <span class="text-xs text-txt-secondary opacity-70">備考：</span>
                                        <span th:text="${req.requestedRemarks}"></span>
                                    </div>
                                </div>
                            </td>
                            <td class="min-w-[12rem] max-w-sm whitespace-pre-wrap break-words align-top" th:text="${req.reason}"></td>
                            <td>
                                <span class="badge badge-warning"
                                      th:if="${req.status == correctionStatusPending}"><i class="fas fa-hourglass-half mr-1"></i>申請中</span>
                                <span class="badge badge-success"
                                      th:if="${req.status == correctionStatusApproved}"><i class="fas fa-check mr-1"></i>承認済み</span>
                                <span class="badge badge-danger"
                                      th:if="${req.status == correctionStatusRejected}"><i class="fas fa-times mr-1"></i>却下</span>
                                <span class="badge badge-primary"
                                      th:unless="${req.status == correctionStatusPending
                                                or req.status == correctionStatusApproved
                                                or req.status == correctionStatusRejected}">取り下げ</span>
                            </td>
                            <td class="min-w-[12rem] max-w-sm whitespace-pre-wrap break-words align-top" th:text="${req.actionComment != null ? req.actionComment : '-'}"></td>
                            <td>
                                <form th:if="${req.status == correctionStatusPending}"
                                      th:action="@{/attendance/corrections/{id}/withdraw(id=${req.requestId})}"
                                      method="post"
                                      onsubmit="return confirm('この修正申請を取り下げてもよろしいですか？');"
                                      class="m-0">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-flat px-3 py-1.5 text-xs gap-1.5 cursor-pointer">
                                        <i class="fas fa-undo"></i> 取り下げ
                                    </button>
                                </form>
                                <span th:unless="${req.status == correctionStatusPending}"
                                      class="text-txt-secondary text-xs opacity-60">-</span>
                            </td>
                        </tr>
                        <tr th:if="${requests == null or requests.isEmpty()}">
                            <td colspan="7" class="text-center py-12 text-txt-secondary opacity-80">
                                <i class="fas fa-inbox fa-2x mb-2 text-txt-secondary/50"></i>
                                <p class="text-sm font-medium">修正申請はありません</p>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>

    </div>
</body>
</html>
