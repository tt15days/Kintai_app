<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='leaves'">
<head>
    <title>新規休暇申請</title>
</head>
<body>
    <h2 layout:fragment="page-title">新規休暇申請</h2>
    <div layout:fragment="content">

        <div class="container mx-auto px-4 py-6">
            <div class="max-w-3xl mx-auto">
                <div class="card">
                    <div class="flex items-center justify-between pb-4 mb-6 border-b border-glass-border/30">
                        <h4 class="text-lg font-bold text-txt-primary flex items-center gap-2">
                            新規休暇申請
                        </h4>
                    </div>
                    <div>

                        <!-- Flash messages -->
                        <div class="mb-4" th:if="${message != null}">
                            <div class="alert alert-success gap-2" role="alert" th:text="${message}"></div>
                        </div>
                        <div class="mb-4" th:if="${error != null}">
                            <div class="alert alert-danger gap-2" role="alert" th:text="${error}"></div>
                        </div>

                        <form th:action="@{/leave/create}" method="post" class="space-y-5">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="form-group">
                                    <label for="startDate" class="form-label">開始日 <span class="text-danger font-bold">*</span></label>
                                    <input type="date" id="startDate" name="startDate" class="form-input font-mono"
                                           th:value="${leaveStartDate != null ? leaveStartDate : ''}" required>
                                </div>
                                <div class="form-group">
                                    <label for="endDate" class="form-label">終了日 <span class="text-danger font-bold">*</span></label>
                                    <input type="date" id="endDate" name="endDate" class="form-input font-mono"
                                           th:value="${leaveEndDate != null ? leaveEndDate : ''}" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="leaveType" class="form-label">休暇タイプ <span class="text-danger font-bold">*</span></label>
                                <select id="leaveType" name="leaveType" class="form-select" required>
                                    <option th:each="type : ${leaveTypes}"
                                            th:value="${type}"
                                            th:text="${type.displayName}"
                                            th:selected="${selectedLeaveType != null ? selectedLeaveType == type : false}"></option>
                                </select>
                            </div>

                            <div class="form-group">
                                <span class="form-label">期間種別 <span class="text-danger font-bold">*</span></span>
                                <div class="flex flex-wrap gap-4 mt-1">
                                    <label class="choice-label gap-2 text-sm text-txt-primary">
                                        <input type="radio" id="durationFullDay" name="leaveDurationType" value="FULL_DAY"
                                               th:checked="${selectedLeaveDurationType == null or selectedLeaveDurationType == 'FULL_DAY'}">
                                        終日
                                    </label>
                                    <label class="choice-label gap-2 text-sm text-txt-primary">
                                        <input type="radio" id="durationAmHalf" name="leaveDurationType" value="AM_HALF"
                                               th:checked="${selectedLeaveDurationType == 'AM_HALF'}">
                                        午前半休
                                    </label>
                                    <label class="choice-label gap-2 text-sm text-txt-primary">
                                        <input type="radio" id="durationPmHalf" name="leaveDurationType" value="PM_HALF"
                                               th:checked="${selectedLeaveDurationType == 'PM_HALF'}">
                                        午後半休
                                    </label>
                                </div>
                                <small class="text-xs text-txt-secondary mt-1.5 block">
                                    午前半休・午後半休は開始日と終了日が同じ単日の場合のみ申請できます。
                                </small>
                            </div>

                            <div class="form-group">
                                <label for="reason" class="form-label">申請理由 <span class="text-danger font-bold">*</span></label>
                                <textarea id="reason" name="reason" class="form-textarea" rows="3"
                                          placeholder="休暇の理由を入力してください" required
                                          maxlength="1000" th:text="${reason != null ? reason : ''}"></textarea>
                            </div>

                            <div class="flex gap-3 pt-2">
                                <button type="submit" class="btn btn-primary px-6 py-3 text-sm cursor-pointer gap-2">
                                    申請する
                                </button>
                                <a th:href="@{/leave}" class="btn btn-flat px-6 py-3 text-sm cursor-pointer gap-2">
                                    一覧へ戻る
                                </a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>

    </div>

    <th:block layout:fragment="js">
        <script th:inline="javascript">
            /*<![CDATA[*/
            document.addEventListener('DOMContentLoaded', function () {
                var startDateInput = document.getElementById('startDate');
                var endDateInput = document.getElementById('endDate');
                var halfDayRadios = document.querySelectorAll('input[name="leaveDurationType"][value="AM_HALF"], input[name="leaveDurationType"][value="PM_HALF"]');
                var fullDayRadio = document.getElementById('durationFullDay');

                function syncEndDateForHalfDay() {
                    var isHalfDay = document.querySelector('input[name="leaveDurationType"]:checked') &&
                        document.querySelector('input[name="leaveDurationType"]:checked').value !== 'FULL_DAY';
                    if (isHalfDay && startDateInput.value) {
                        endDateInput.value = startDateInput.value;
                        endDateInput.readOnly = true;
                    } else {
                        endDateInput.readOnly = false;
                    }
                }

                halfDayRadios.forEach(function (radio) {
                    radio.addEventListener('change', syncEndDateForHalfDay);
                });
                if (fullDayRadio) {
                    fullDayRadio.addEventListener('change', syncEndDateForHalfDay);
                }
                startDateInput.addEventListener('change', syncEndDateForHalfDay);

                syncEndDateForHalfDay();
            });
            /*]]>*/
        </script>
    </th:block>
</body>
</html>
