<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='corrections'">
<head>
    <title>修正申請承認</title>
</head>
<body>
    <h2 layout:fragment="page-title">修正申請承認</h2>

    <div layout:fragment="content">



<div class="container mx-auto px-4 py-6">
    <div class="max-w-6xl mx-auto">
        <div class="card">
            <div class="flex items-center justify-between pb-4 mb-6 border-b border-glass-border/30">
                <h4 class="text-lg font-bold text-txt-primary flex items-center gap-2">
                    勤怠修正申請の承認待ち一覧
                </h4>
            </div>
            <div>

                <div class="mb-4" th:if="${message != null}">
                    <div class="alert alert-success gap-2" role="alert">
                        <span th:text="${message}"></span>
                    </div>
                </div>
                <div class="mb-4" th:if="${error != null}">
                    <div class="alert alert-danger gap-2" role="alert">
                        <span th:text="${error}"></span>
                    </div>
                </div>

                <div class="table-container">
                    <table class="table-custom">
                        <thead class="bg-black/10 text-txt-primary">
                        <tr>
                            <th>申請ID</th>
                            <th>申請者</th>
                            <th>対象日</th>
                            <th>対象年月</th>
                            <th>修正前</th>
                            <th>修正後</th>
                            <th>修正理由</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="req : ${pendingRequests}">
                            <td class="font-semibold" th:text="${req.requestId}"></td>
                            <td>
                                <span class="font-semibold"
                                      th:with="u=${applicantUsers[req.userId]}"
                                      th:text="${u != null ? u.fullName : '不明'}"></span>
                                <br>
                                <span class="text-xs text-txt-secondary opacity-80"
                                      th:with="u=${applicantUsers[req.userId]}"
                                      th:text="${u != null ? u.email : ''}"></span>
                            </td>
                            <td class="font-mono" th:text="${req.attendanceDate != null ? #temporals.format(req.attendanceDate, 'yyyy-MM-dd') : '-'}"></td>
                            <td th:text="${req.targetYearMonth}"></td>
                            <!-- 修正前 -->
                            <td>
                                <div class="flex flex-col gap-0.5">
                                    <div>
                                        <span class="text-xs text-txt-secondary opacity-70">開始：</span>
                                        <span class="font-mono" th:text="${req.currentStartTime != null ? #temporals.format(req.currentStartTime, 'HH:mm') : '-'}"></span>
                                    </div>
                                    <div>
                                        <span class="text-xs text-txt-secondary opacity-70">終了：</span>
                                        <span class="font-mono" th:text="${req.currentEndTime != null ? #temporals.format(req.currentEndTime, 'HH:mm') : '-'}"></span>
                                    </div>
                                    <div th:if="${req.currentRemarks != null and !req.currentRemarks.isEmpty()}">
                                        <span class="text-xs text-txt-secondary opacity-70">備考：</span>
                                        <span class="text-xs" th:text="${req.currentRemarks}"></span>
                                    </div>
                                </div>
                            </td>
                            <!-- 修正後 -->
                            <td>
                                <div class="flex flex-col gap-0.5">
                                    <div>
                                        <span class="text-xs text-txt-secondary opacity-70">開始：</span>
                                        <span class="font-semibold text-primary font-mono" th:text="${req.requestedStartTime != null ? #temporals.format(req.requestedStartTime, 'HH:mm') : '（なし）'}"></span>
                                    </div>
                                    <div>
                                        <span class="text-xs text-txt-secondary opacity-70">終了：</span>
                                        <span class="font-semibold text-primary font-mono" th:text="${req.requestedEndTime != null ? #temporals.format(req.requestedEndTime, 'HH:mm') : '（なし）'}"></span>
                                    </div>
                                    <div th:if="${req.requestedRemarks != null and !req.requestedRemarks.isEmpty()}">
                                        <span class="text-xs text-txt-secondary opacity-70">備考：</span>
                                        <span class="text-xs text-primary font-medium" th:text="${req.requestedRemarks}"></span>
                                    </div>
                                </div>
                            </td>
                            <td class="min-w-[12rem] max-w-sm whitespace-pre-wrap break-words align-top" th:text="${req.reason}"></td>
                            <td>
                                <div class="flex flex-col gap-2 min-w-[150px]">
                                    <!-- 承認フォーム -->
                                    <form th:action="@{/attendance/approval/corrections/{id}/approve(id=${req.requestId})}"
                                          method="post" onsubmit="return confirm('この修正申請を承認しますか？');">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="text" class="form-input px-2.5 py-1 text-base md:text-xs mb-1.5"
                                               name="comment" placeholder="承認コメント（任意）" maxlength="500">
                                        <button type="submit" class="btn btn-success w-full py-1.5 text-xs gap-1.5 cursor-pointer">
                                            承認
                                        </button>
                                    </form>
                                    <!-- 却下フォーム -->
                                    <form th:action="@{/attendance/approval/corrections/{id}/reject(id=${req.requestId})}"
                                          method="post" onsubmit="return confirm('この修正申請を却下しますか？');">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="text" class="form-input px-2.5 py-1 text-base md:text-xs mb-1.5"
                                               name="comment" placeholder="却下理由（任意）" maxlength="500">
                                        <button type="submit" class="btn btn-danger w-full py-1.5 text-xs gap-1.5 cursor-pointer">
                                            却下
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${pendingRequests == null or pendingRequests.isEmpty()}">
                            <td colspan="8" class="text-center py-12 text-txt-secondary opacity-80">
                                <p class="text-sm font-medium">承認待ちの修正申請はありません</p>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>

    </div>
</body>
</html>
