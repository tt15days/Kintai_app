<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='password'">
<head>
    <title>パスワード変更</title>
</head>
<body>
    <h2 layout:fragment="page-title">パスワード変更</h2>

    <div layout:fragment="content">

    <!-- ナビゲーションバー -->
    

    <div class="w-full">
        <div class="content">
            <div class="card">
                <div class="border-b border-glass-border pb-4 mb-4">
                    <h4 class="m-0 text-lg font-bold text-txt-primary"><i class="fas fa-key"></i> パスワード変更</h4>
                </div>
                <div>
                    <div th:if="${param.required}" class="alert alert-warning mb-4" role="alert">
                        <i class="fas fa-exclamation-triangle"></i>
                        <strong>必須:</strong> 管理者によりパスワードが初期化されています。利用を続けるには新しいパスワードを設定してください。
                    </div>

                    <div th:if="${error}" class="alert alert-danger mb-4" role="alert">
                        <i class="fas fa-exclamation-circle"></i>
                        <strong>エラー:</strong> <span th:text="${error}"></span>
                    </div>

                    <div th:if="${param.passwordChanged}" class="alert alert-success mb-4" role="alert">
                        <i class="fas fa-check-circle"></i>
                        <strong>成功:</strong> パスワードが正常に変更されました。
                    </div>

                    <form method="post" th:action="@{/dashboard/change-password}">
                        <div class="form-group">
                            <label for="oldPassword" class="form-label">
                                現在のパスワード <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-input" id="oldPassword" name="oldPassword" required 
                                   placeholder="現在のパスワードを入力してください">
                            <small class="text-xs text-txt-secondary mt-1.5 block">
                                セキュリティ確認のため現在のパスワードを入力してください。
                            </small>
                        </div>

                        <div class="form-group">
                            <label for="newPassword" class="form-label">
                                新しいパスワード <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-input" id="newPassword" name="newPassword" required minlength="8"
                                   placeholder="最小8文字の英数字">
                            <small class="text-xs text-txt-secondary mt-1.5 block">
                                8文字以上の英数字で新しいパスワードを設定してください。
                            </small>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword" class="form-label">
                                パスワード確認 <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-input" id="confirmPassword" name="confirmPassword" required minlength="8"
                                   placeholder="新しいパスワードを再度入力してください">
                            <small class="text-xs text-txt-secondary mt-1.5 block">
                                新しいパスワードと同じ値を入力してください。
                            </small>
                        </div>

                        <hr class="border-glass-border my-6">

                        <div class="flex gap-2">
                            <button type="submit" class="btn btn-primary px-5 py-3 text-sm cursor-pointer gap-2">
                                <i class="fas fa-save"></i> パスワードを変更
                            </button>
                            <a th:href="@{/dashboard}" class="btn btn-flat px-5 py-3 text-sm cursor-pointer gap-2">
                                <i class="fas fa-times"></i> キャンセル
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    </div>
</body>
</html>
