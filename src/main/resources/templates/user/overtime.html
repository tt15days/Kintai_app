<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='overtime'">
<head>
    <title>残業管理</title>
</head>
<body>
    <h2 layout:fragment="page-title">残業管理</h2>

    <div layout:fragment="content">

    <!-- ナビゲーションバー -->
    

    <div class="w-full">
        <div class="content">
            <div class="card">
                <div class="border-b border-glass-border pb-4 mb-4 flex justify-between items-center">
                    <h4 class="m-0 text-lg font-bold text-txt-primary">残業管理</h4>
                    <small class="text-txt-secondary font-mono" th:text="${yearMonth}"></small>
                </div>
                <div>
                    <div class="alert alert-primary mb-4" role="alert">
                        残業は勤怠管理画面で保存した勤務実績から自動計算されます。
                        基準勤務時間は設定された勤務スケジュールに従います。
                    </div>

                    <!-- 月間残業時間サマリー -->
                    <div class="alert alert-warning mb-4" role="alert">
                        <h6 class="m-0 flex items-center gap-2">
                            <strong>今月の残業合計時間: </strong>
                            <span class="font-mono text-lg" th:text="${T(com.attendance.app.util.DateTimeUtil).formatHoursToHHmm(monthlyOvertime)}"></span>
                        </h6>
                    </div>

                    <hr class="border-glass-border my-6">

                    <!-- 残業記録一覧 -->
                    <h5 class="m-0 text-base font-bold text-txt-primary mb-3">残業記録一覧</h5>
                    <div class="table-container">
                        <table class="table-custom mb-0">
                            <thead>
                                <tr>
                                    <th>日付</th>
                                    <th>開始時刻</th>
                                    <th>終了時刻</th>
                                    <th>残業時間</th>
                                    <th>理由</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="record : ${records}">
                                    <td class="font-mono text-left" th:text="${#temporals.format(record.overtimeDate, 'yyyy-MM-dd (E)')}"></td>
                                    <td class="font-mono text-left" th:text="${record.overtimeStart != null ? #temporals.format(record.overtimeStart, 'HH:mm') : '-'}"></td>
                                    <td class="font-mono text-left" th:text="${record.overtimeEnd != null ? #temporals.format(record.overtimeEnd, 'HH:mm') : '-'}"></td>
                                    <td class="text-left">
                                        <span class="badge badge-warning font-mono">
                                            <span th:text="${T(com.attendance.app.util.DateTimeUtil).formatHoursToHHmm(record.overtimeHours)}"></span>
                                        </span>
                                    </td>
                                    <td class="text-left" th:text="${record.reason != null ? record.reason : '-'}"></td>
                                </tr>
                                <tr th:if="${records.isEmpty()}">
                                    <td colspan="5" class="text-center py-4 text-txt-secondary">
                                        残業記録がありません
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-4">
                        <a th:href="@{/dashboard}" class="btn btn-flat px-5 py-3 text-sm cursor-pointer gap-2">
                            ダッシュボードに戻る
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    </div>
</body>
</html>
