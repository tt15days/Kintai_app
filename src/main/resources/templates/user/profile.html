<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='profile'">

<head>
    <title>プロフィール</title>
</head>

<body>
    <h2 layout:fragment="page-title">プロフィール</h2>

    <div layout:fragment="content">
        <div class="w-full">
            <div class="content mt-4">

                <div th:if="${successMessage}" class="alert alert-success" role="alert">
                    <span><span th:text="${successMessage}"></span></span>
                    <button type="button" class="icon-button shrink-0 text-txt-primary hover:opacity-100 opacity-70 transition-opacity bg-transparent border-0 text-xl leading-none cursor-pointer" onclick="this.closest('[role=alert], .bg-success\/15, .bg-danger\/12').remove()" aria-label="閉じる">×</button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                    <span><span th:text="${errorMessage}"></span></span>
                    <button type="button" class="icon-button shrink-0 text-txt-primary hover:opacity-100 opacity-70 transition-opacity bg-transparent border-0 text-xl leading-none cursor-pointer" onclick="this.parentElement.parentElement.remove()" aria-label="閉じる">×</button>
                </div>
                <div th:if="${error}" class="alert alert-danger justify-center text-center" role="alert">
                    <span th:text="${error}"></span>
                </div>

                <!-- プロフィール情報 -->
                <div class="card mb-6">
                    <div class="border-b border-glass-border pb-4 mb-4">
                        <h4 class="m-0 text-lg font-bold text-txt-primary">プロフィール</h4>
                    </div>
                    <div th:if="${currentUser != null}">
                        <dl class="grid grid-cols-1 sm:grid-cols-[1fr_2fr] gap-x-4 gap-y-3 mb-0 text-sm">
                            <dt class="font-semibold text-txt-secondary">氏名</dt>
                            <dd class="mb-0 text-txt-primary" th:text="${currentUser.fullName}"></dd>

                            <dt class="font-semibold text-txt-secondary">メールアドレス</dt>
                            <dd class="mb-0 text-txt-primary" th:text="${currentUser.email}"></dd>

                            <dt class="font-semibold text-txt-secondary">役職</dt>
                            <dd class="mb-0 text-txt-primary"
                                th:text="${currentUser.positionTitle != null and !#strings.isEmpty(currentUser.positionTitle) ? currentUser.positionTitle : '-'}">
                            </dd>

                            <dt class="font-semibold text-txt-secondary">電話番号</dt>
                            <dd class="mb-0 text-txt-primary"
                                th:text="${currentUser.phoneNumber != null and !#strings.isEmpty(currentUser.phoneNumber) ? currentUser.phoneNumber : '-'}">
                            </dd>

                            <dt class="font-semibold text-txt-secondary">部署</dt>
                            <dd class="mb-0 text-txt-primary"
                                th:text="${currentUser.className != null and !#strings.isEmpty(currentUser.className) ? currentUser.className : '-'}">
                            </dd>

                            <dt class="font-semibold text-txt-secondary">有給付与日数</dt>
                            <dd class="mb-0 text-txt-primary"
                                th:text="${currentUser.paidLeaveDays != null ? currentUser.paidLeaveDays + ' 日' : '-'}">
                            </dd>

                            <dt class="font-semibold text-txt-secondary">当年使用日数</dt>
                            <dd class="mb-0 text-txt-primary"
                                th:text="${yearlyUsedPaidLeaveDays != null ? yearlyUsedPaidLeaveDays + ' 日' : '-'}">
                            </dd>

                            <dt class="font-semibold text-txt-secondary">残有給日数</dt>
                            <dd class="mb-0">
                                <span
                                    th:if="${remainingPaidLeaveDays != null and remainingPaidLeaveDays.signum() &lt; 0}"
                                    class="text-danger font-bold"
                                    th:text="${#numbers.formatDecimal(remainingPaidLeaveDays, 1, 1) + ' 日'}"></span>
                                <span th:if="${remainingPaidLeaveDays != null and remainingPaidLeaveDays.signum() >= 0}"
                                    class="text-success font-bold"
                                    th:text="${#numbers.formatDecimal(remainingPaidLeaveDays, 1, 1) + ' 日'}"></span>
                                <span th:if="${remainingPaidLeaveDays == null}">-</span>
                            </dd>
                        </dl>
                    </div>
                </div>

                <!-- 所属クラス -->
                <div class="card mb-6">
                    <div class="border-b border-glass-border pb-4 mb-4">
                        <h5 class="m-0 text-lg font-bold text-txt-primary">所属クラス（勤務時間帯）</h5>
                    </div>
                    <div>
                        <p class="text-txt-secondary text-sm mb-3">
                            所属クラスは残業時間の計算基準となります。クラスが未設定の場合はシステムのデフォルト（09:00〜18:00）が適用されます。
                        </p>

                        <!-- 現在のクラス情報 -->
                        <div th:with="currentClassName=${currentUser != null ? currentUser.className : null}">
                            <div th:if="${currentClassName != null and currentWorkScheduleClass != null}"
                                class="bg-primary/10 border border-primary/20 text-primary p-4 rounded-xl mb-4 text-sm">
                                現在の所属クラス:
                                <strong th:with="wsc=${currentWorkScheduleClass}">
                                    <span th:text="${wsc.name}"></span>
                                    （<span th:text="${#strings.substring(wsc.startTime.toString(), 0, 5)}"></span>
                                    〜
                                    <span th:text="${#strings.substring(wsc.endTime.toString(), 0, 5)}"></span>、
                                    休憩 <span th:text="${wsc.breakScheduleSummary}"></span>
                                    <span th:if="${wsc.workLocation != null and !#strings.isEmpty(wsc.workLocation)}">
                                        、勤務地: <span th:text="${wsc.workLocation}"></span>
                                    </span>）
                                </strong>
                            </div>
                            <div th:if="${currentClassName == null}" class="bg-black/5 border border-glass-border text-txt-primary p-4 rounded-xl mb-4 text-sm">
                                所属クラスは未設定です。デフォルトの勤務時間（09:00〜18:00）が適用されます。
                            </div>
                        </div>

                        <form method="post" th:action="@{/profile/work-schedule}" class="flex flex-wrap items-end gap-3 mb-4">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="flex flex-col min-w-[260px]">
                                <label for="profileClassName" class="form-label">勤務クラスを変更</label>
                                <select id="profileClassName" name="className" class="form-select h-11">
                                    <option value="">-- 未設定 --</option>
                                    <option th:each="workScheduleClass : ${workScheduleClasses}"
                                        th:value="${workScheduleClass.name}" th:text="${workScheduleClass.name}"
                                        th:selected="${currentUser.className == workScheduleClass.name}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary h-11 px-5">変更する</button>
                        </form>
                        <a th:href="@{/dashboard}" class="btn btn-flat px-5 py-3 text-sm cursor-pointer gap-2">
                            ダッシュボードへ戻る
                        </a>
                    </div>
                </div>

                <!-- 有給休暇残高カード -->
                <div class="card mt-6">
                    <div class="border-b border-glass-border pb-4 mb-4 flex justify-between items-center">
                        <h5 class="m-0 text-lg font-bold text-txt-primary">有給休暇残高</h5>
                        <span class="badge badge-success"
                            th:text="'残 ' + ${totalRemainingPaidLeaveDays != null ? totalRemainingPaidLeaveDays : 0} + ' 日'"></span>
                    </div>
                    <div>
                        <div th:if="${paidLeaveBalances == null or paidLeaveBalances.isEmpty()}" class="p-3 text-txt-secondary">
                            有給残高データがありません。管理者にお問い合わせください。
                        </div>
                        <div th:if="${paidLeaveBalances != null and !paidLeaveBalances.isEmpty()}"
                            class="table-container">
                            <table class="table-custom mb-0">
                                <thead>
                                    <tr>
                                        <th>付与年度</th>
                                        <th>付与日</th>
                                        <th>付与</th>
                                        <th>繰越</th>
                                        <th>使用済</th>
                                        <th>残日数</th>
                                        <th>失効日</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="bal : ${paidLeaveBalances}"
                                        th:classappend="${bal.remainingDays <= 0} ? 'opacity-65 text-txt-secondary' : ''">
                                        <td th:text="${bal.grantYear + '年度'}"></td>
                                        <td class="font-mono"
                                            th:text="${bal.grantDate != null ? #temporals.format(bal.grantDate, 'yyyy/MM/dd') : '-'}">
                                        </td>
                                        <td class="font-mono" th:text="${bal.grantedDays}"></td>
                                        <td class="font-mono" th:text="${bal.carriedOverDays}"></td>
                                        <td class="font-mono" th:text="${bal.usedDays}"></td>
                                        <td class="font-mono">
                                            <strong
                                                th:classappend="${bal.remainingDays > 0} ? 'text-success' : 'text-txt-secondary'"
                                                th:text="${bal.remainingDays}"></strong>
                                        </td>
                                        <td class="font-mono"
                                            th:text="${bal.expiryDate != null ? #temporals.format(bal.expiryDate, 'yyyy/MM/dd') : '-'}">
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>
</body>

</html>
