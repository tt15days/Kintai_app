<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/base}" th:with="activePage='attendance'">
<head>
    <title>勤怠修正申請</title>
</head>
<body>
    <h2 layout:fragment="page-title">勤怠修正申請</h2>

    <div layout:fragment="content">

<div class="container mx-auto px-4 py-6">
    <div class="max-w-3xl mx-auto">
        <div class="card">
            <div class="flex items-center justify-between pb-4 mb-6 border-b border-glass-border/30">
                <h4 class="text-lg font-bold text-txt-primary flex items-center gap-2">
                    勤怠修正申請
                    <span th:if="${targetDate != null}" class="ml-2 text-sm font-normal text-txt-secondary font-mono"
                          th:text="${#temporals.format(targetDate, 'yyyy年MM月dd日')}"></span>
                </h4>
            </div>
            <div>

                <div class="mb-4" th:if="${error != null}">
                    <div class="alert alert-danger gap-2" role="alert">
                        <span th:text="${error}"></span>
                    </div>
                </div>

                <!-- 現在の勤怠記録（参照用） -->
                <div th:if="${currentStart != null or currentEnd != null or currentRemarks != null}" class="mb-6">
                    <h6 class="text-sm font-bold text-txt-secondary mb-3 flex items-center gap-1.5">
                        現在の勤怠記録
                    </h6>
                    <div class="border border-glass-border/30 rounded-xl overflow-hidden max-w-md">
                        <table class="min-w-full text-left border-collapse">
                            <tbody>
                            <tr>
                                <th class="p-3 text-xs font-bold uppercase tracking-wider text-txt-secondary bg-black/10 border-b border-glass-border/20 w-1/3">開始時刻</th>
                                <td class="p-3 text-sm text-txt-primary border-b border-glass-border/10 font-mono" th:text="${currentStart != null ? currentStart : '-'}"></td>
                            </tr>
                            <tr>
                                <th class="p-3 text-xs font-bold uppercase tracking-wider text-txt-secondary bg-black/10 border-b border-glass-border/20 w-1/3">終了時刻</th>
                                <td class="p-3 text-sm text-txt-primary border-b border-glass-border/10 font-mono" th:text="${currentEnd != null ? currentEnd : '-'}"></td>
                            </tr>
                            <tr>
                                <th class="p-3 text-xs font-bold uppercase tracking-wider text-txt-secondary bg-black/10 w-1/3">備考</th>
                                <td class="p-3 text-sm text-txt-primary font-mono" th:text="${currentRemarks != null ? currentRemarks : '-'}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:unless="${currentStart != null or currentEnd != null or currentRemarks != null}" class="mb-6">
                    <div class="alert alert-primary gap-2">
                        この日付の勤怠記録はまだ登録されていません。
                    </div>
                </div>

                <form th:action="@{/attendance/corrections/submit}" method="post" class="space-y-5">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="attendanceDate"
                           th:value="${targetDate != null ? targetDate : ''}" />
                    <input type="hidden" name="yearMonth"
                           th:value="${yearMonth != null ? yearMonth : ''}" />

                    <h6 class="text-sm font-bold text-txt-secondary border-b border-glass-border/20 pb-2 flex items-center gap-1.5">
                        修正後の内容
                    </h6>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="form-group">
                            <label for="requestedStartTime" class="form-label">開始時刻</label>
                            <input type="time" id="requestedStartTime" name="requestedStartTime" class="form-input font-mono"
                                   th:value="${currentStart != null ? currentStart : ''}">
                        </div>
                        <div class="form-group">
                            <label for="requestedEndTime" class="form-label">終了時刻</label>
                            <input type="time" id="requestedEndTime" name="requestedEndTime" class="form-input font-mono"
                                   th:value="${currentEnd != null ? currentEnd : ''}">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="requestedRemarks" class="form-label">備考</label>
                        <input type="text" id="requestedRemarks" name="requestedRemarks"
                               class="form-input"
                               th:value="${currentRemarks != null ? currentRemarks : ''}"
                               placeholder="備考（任意）" maxlength="500" />
                    </div>

                    <div class="form-group">
                        <label for="reason" class="form-label">修正理由 <span class="text-danger font-bold">*</span></label>
                        <textarea id="reason" name="reason"
                                  class="form-textarea" rows="3"
                                  placeholder="修正が必要な理由を入力してください"
                                  required maxlength="1000"></textarea>
                    </div>

                    <div class="flex gap-3 pt-2">
                        <button type="submit" class="btn btn-primary px-6 py-3 text-sm cursor-pointer gap-2">
                            申請を提出
                        </button>
                        <a th:href="@{/attendance(yearMonth=${yearMonth})}" class="btn btn-flat px-6 py-3 text-sm cursor-pointer gap-2">
                            戻る
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

    </div>
</body>
</html>
