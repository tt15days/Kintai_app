name: Java CI with Maven and PostgreSQL

# GITHUB_TOKEN の権限を最小化（チェックアウトとキャッシュ読み取りのみ）
permissions:
  contents: read

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Tokyo
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Tokyo

    services:
      postgres:
        # PostgreSQLのメジャー更新は、互換性を確認したレビュー済みPRでのみ行う。
        image: postgres:18
        env:
          POSTGRES_DB: attendance_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test999
          TZ: Asia/Tokyo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up JDK 25
        # v4.7.1
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean verify -Dspring.profiles.active=local

      - name: Package release artifact
        run: mvn clean package -P release -DskipTests

      - name: Verify release profile resources
        run: |
          jar tf target/*.jar | grep -qx 'BOOT-INF/classes/application-release.yml'
          ! jar tf target/*.jar | grep -q 'BOOT-INF/classes/application-local.yml'
